const SCOPES    = "https://www.googleapis.com/auth/spreadsheets";
const DISCOVERY = "https://sheets.googleapis.com/$discovery/rest?version=v4";
let tokenClient = null, gapiInited = false, gisInited = false, _token = null;

function initGoogleAPI(onReady) {
  function maybeReady() { if (gapiInited && gisInited) onReady(); }
  const poll = setInterval(() => {
    if (typeof gapi !== "undefined" && typeof google !== "undefined") {
      clearInterval(poll);
      gapi.load("client", async () => {
        await gapi.client.init({ discoveryDocs: [DISCOVERY] });
        gapiInited = true; maybeReady();
      });
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: window.INVESTBOOK_CONFIG.CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => {
          if (resp.error) return;
          _token = resp.access_token;
          gapi.client.setToken({ access_token: _token });
          window._authCb && window._authCb();
        },
      });
      gisInited = true; maybeReady();
    }
  }, 150);
}

function withAuth(cb) {
  window._authCb = cb;
  if (_token) { cb(); return; }
  tokenClient.requestAccessToken({ prompt: "" });
}

async function sheetsGet(range) {
  const r = await gapi.client.sheets.spreadsheets.values.get({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID, range });
  return r.result.values || [];
}
async function sheetsSet(range, values) {
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
    range, valueInputOption: "RAW", resource: { values } });
}
async function ensureSheets() {
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID });
  const have = meta.result.sheets.map(s => s.properties.title);
  const need = ["manual_positions","imported_positions","settings","pension_accounts","pension_entries"].filter(n => !have.includes(n));
  if (!need.length) return;
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
    resource: { requests: need.map(title => ({ addSheet: { properties: { title } } })) }
  });
}

const PHDR = ["id","name","broker","category","invested","value","currency","fx","start","annReturn","shares","ticker"];
const PHDR_IMP = ["id","name","broker","category","invested","currency","fx","start","shares","ticker","priceCZK"];
const posToRowImp = p => [p.id,p.name,p.broker,p.category,p.invested,p.currency,p.fx??"",p.start,p.shares??"",p.ticker??"",p.priceCZK??""];
const pf = s => { if (s==null||s==="") return 0; const n = parseFloat(String(s).replace(/\s/g,"").replace(",",".")); return isFinite(n)?n:0; };
const pfn = s => { if (s==null||s==="") return null; const n = parseFloat(String(s).replace(/\s/g,"").replace(",",".")); return isFinite(n)?n:null; };
const rowToImp = r => ({
  id: Number(r[0])||0, name: r[1]||"", broker: r[2]||"", category: r[3]||"Akcie",
  invested: pf(r[4]), value: pf(r[4]),

const posToRow = p => [p.id,p.name,p.broker,p.category,p.invested,p.value,p.currency,p.fx??"",p.start,p.annReturn??"",p.shares??"",p.ticker??""];
const rowToPos = r => ({
  id: Number(r[0])||0, name: r[1]||"", broker: r[2]||"", category: r[3]||"Akcie",
  invested: pf(r[4]), value: pf(r[5]),

async function clearSheet(name) {
  await gapi.client.sheets.spreadsheets.values.clear({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
    range: name + "!A1:Z10000",
  });
}
const PENSION_SHEET_HDR = ["id","name","myContrib","employerContrib","startYear","myTotal","employerTotal","stateTotal","appreciation"];
const PENSION_ENTRY_HDR = ["accountId","entryId","label","amount"];

function pensionToRows(accounts) {
  const accs = accounts.map(a => [a.id, a.name, a.myContrib||0, a.employerContrib||0, a.startYear||2006, a.myTotal||0, a.employerTotal||0, a.stateTotal||0, a.appreciation||0]);
  const entries = accounts.flatMap(a => (a.entries||[]).map(e => [a.id, e.id, e.label, e.amount]));
  return { accs, entries };
}

function rowsToPension(accRows, entryRows) {
  const accounts = accRows.filter(r=>r.length>=2).map(r => ({
    id: +r[0], name: r[1], myContrib: +r[2]||0, employerContrib: +r[3]||0,
    startYear: +r[4]||2006, myTotal: +r[5]||0, employerTotal: +r[6]||0,
    stateTotal: +r[7]||0, appreciation: +r[8]||0, entries: []
  }));
  for (const r of entryRows.filter(r=>r.length>=4)) {
    const acc = accounts.find(a => a.id === +r[0]);
    if (acc) acc.entries.push({ id: +r[1], label: r[2], amount: +r[3]||0 });
  }
  return accounts;
}

async function saveToSheets(manual, imported, settings, pension) {
  await ensureSheets();
  await Promise.all([
    clearSheet("manual_positions"),
    clearSheet("imported_positions"),
    clearSheet("settings"),
    clearSheet("pension_accounts").catch(()=>{}),
    clearSheet("pension_entries").catch(()=>{}),
  ]);
  const { accs, entries } = pensionToRows(pension || []);
  await sheetsSet("manual_positions!A1",   [PHDR, ...manual.map(posToRow)]);
  await sheetsSet("imported_positions!A1", [PHDR_IMP, ...imported.map(posToRowImp)]);
  await sheetsSet("settings!A1", [["key","value"], ...Object.entries(settings).map(([k,v])=>[k,v])]);
  await sheetsSet("pension_accounts!A1", [PENSION_SHEET_HDR, ...accs]);
  if (entries.length) await sheetsSet("pension_entries!A1", [PENSION_ENTRY_HDR, ...entries]);
}

async function ensurePricesHeader() {
  // Ensure prices sheet has header row A1:C1 with formula column
  try {
    const hdr = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID, range: "prices!A1:C1"
    });
    const row = (hdr.result.values || [])[0] || [];
    if (row[2] !== "priceCZK") {
      // Write header with formula column
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
        range: "prices!A1:C1", valueInputOption: "USER_ENTERED",
        resource: { values: [["ticker", "priceUSD", "priceCZK"]] }
      });
      // Write formula for existing rows (up to 1000)
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
        range: "prices!C2:C1000", valueInputOption: "USER_ENTERED",
        resource: { values: Array.from({length: 999}, (_, i) => [`=B${i+2}*20,57`]) }
      });
    }
  } catch(e) { /* prices sheet may not exist yet */ }
}

async function loadFromSheets() {
  const safeGet = async (range) => { try { return await sheetsGet(range); } catch(e) { return []; } };
  const [m, i, s, p, pa, pe] = await Promise.all([
    safeGet("manual_positions!A2:L1000"),
    safeGet("imported_positions!A2:L1000"),
    safeGet("settings!A2:B100"),
    safeGet("prices!A1:C1000"),
    safeGet("pension_accounts!A2:I1000"),
    safeGet("pension_entries!A2:D10000"),
  ]);
  // First row is header (A1:C1), data starts at row index 1
  const priceRows = (p||[]).slice(1);
  // Build price map: ticker -> priceCZK
  // Apps Script ukládá: sloupec B = priceNative, sloupec C = priceCZK (= priceNative × fx)
  // Bereme sloupec C — hotová CZK hodnota, žádný fx přepočet v appce
  const prices = {};
  for (const row of priceRows) {
    if (!row[0]) continue;
    const ticker = row[0].trim();
    // Sloupec C = priceCZK (Apps Script to přepočítá správným kurzem)
    const col = row[2] && row[2] !== "" ? row[2] : row[1]; // C přednostně, fallback B
    if (col && col !== "") {
      // Sheets formátuje CZK jako "15 004,67 Kč" — odstraníme mezery, Kč, nahradíme čárku tečkou
      const cleaned = String(col).replace(/[\s ]/g,"").replace("Kč","").replace(",",".").replace(/[^0-9.]/g,"");
      const priceCZK = parseFloat(cleaned);
      if (ticker && isFinite(priceCZK) && priceCZK > 0) prices[ticker] = priceCZK;
    }
  }
  const pensionFromSheets = (pa && pa.length) ? rowsToPension(pa, pe||[]) : null;
  return {
    manual:   m.filter(r=>r.length>=6).map(rowToPos),
    imported: i.filter(r=>r.length>=3).map(rowToImp),
    settings: Object.fromEntries((s||[]).map(r=>[r[0],r[1]])),
    prices,
    pension: pensionFromSheets,
  };
}

// ─── CSV PARSER ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  // Parse header
  const parseRow = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  };
  const headers = parseRow(lines[0]);
  return lines.slice(1).map(l => {
    const vals = parseRow(l);
    return Object.fromEntries(headers.map((h, i) => [h, vals[i] || '']));
  });
}

function aggregateCSV(rows) {
  const positions = {};
  for (const r of rows) {
    const way = r['Way'];
    if (!['BUY','SELL'].includes(way)) continue;
    const baseType = r['Base type'];
    if (baseType === 'FIAT') continue;
    const baseCur = (r['Base currency (name)'] || '').trim();
    const ticker  = baseCur.split(' ')[0].trim();
    const name    = baseCur;
    const quoteCur = (r['Quote currency'] || 'USD').trim();
    const baseAmt  = parseFloat(r['Base amount'])  || 0;
    const quoteAmt = parseFloat(r['Quote amount']) || 0;
    let broker = (r['Broker'] || '').trim();
    if (!broker || broker === 'DGA') broker = 'Crypto';
    const year = parseInt((r['Date'] || '2024').substring(0, 4));
    const key  = broker + '||' + ticker;
    if (!positions[key]) {
      const cat = baseType === 'CRYPTO' ? 'Crypto' : (baseType === 'FUND' ? 'ETF' : 'Akcie');
      positions[key] = { ticker, name, broker, category: cat, currency: quoteCur, shares: 0, invested: 0, start: year };
    }
    const p = positions[key];
    if (year < p.start) p.start = year;
    if (way === 'BUY')  { p.shares += baseAmt; p.invested += quoteAmt; }
    else                { p.shares -= baseAmt; p.invested -= quoteAmt; }
  }
  return Object.values(positions).filter(p => p.shares > 0.00001);
}

function EditCell({ value, onSave, align, suffix, color, type, isSelect, options, locked }) {
  align = align || "right"; suffix = suffix || ""; type = type || "number"; isSelect = isSelect || false; options = options || [];
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(String(value));
  const commit = () => { setEditing(false); onSave(draft); };
  const inputStyle = { background: "#0f0f13", border: "1px solid " + T.blue, borderRadius: 6, color: T.text, fontFamily: "'DM Mono','Fira Mono',monospace", fontSize: 13, padding: "4px 8px", width: "100%", outline: "none", textAlign: align };

  if (locked) {
    return (
      <td style={{ padding: "10px 12px", textAlign: align, fontFamily: "'DM Mono',monospace", fontSize: 13, color: color || T.muted }}>
        {value}{suffix}
      </td>
    );
  }

  if (editing) {
    if (isSelect) return (
      <td style={{ padding: "2px 6px" }}>
        <select autoFocus value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit} style={{ ...inputStyle, textAlign: "left" }}>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      </td>
    );
    return (
      <td style={{ padding: "2px 6px" }}>
        <input autoFocus type="text" value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit}
          onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setDraft(String(value)); setEditing(false); } }}
          style={inputStyle} />
      </td>
    );
  }
  return (
    <td onClick={() => { setDraft(String(value)); setEditing(true); }} title="Klikni pro editaci"
      style={{ padding: "10px 12px", textAlign: align, cursor: "text", fontFamily: "'DM Mono',monospace", fontSize: type === "text" ? 13 : 13, color: color || T.text }}>
      <span style={{ borderBottom: "1px dashed rgba(255,255,255,0.1)", paddingBottom: 1 }}>{value}{suffix}</span>
    </td>
  );
}

          const onSort = (key) => {

          return (<>

                <div style={{ display: "flex", gap: 4 }}>
                  {["1M","YTD","1R","3R","MAX"].map(p => (
                    <button key={p} onClick={() => setPeriod(p)}

                        background: period === p ? T.blue : "rgba(255,255,255,0.05)",

                </div>
              </div>
              <ResponsiveContainer width="100%" height={220}>
                <AreaChart data={histData} margin={{ left: 4, right: 4, top: 4, bottom: 0 }}>

                      <stop offset="0%" stopColor={cat.color} stopOpacity={0.25} />

                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
                  <XAxis dataKey="d" tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.tick }} axisLine={false} tickLine={false}

                  <YAxis tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.tick }} axisLine={false} tickLine={false} width={52}
                    domain={[ dataMin => Math.floor(dataMin * 0.95 / 50000) * 50000, dataMax => Math.ceil(dataMax * 1.05 / 50000) * 50000 ]}
                    tickFormatter={v => v >= 1000000 ? (v/1000000).toFixed(1)+"M" : (v/1000).toFixed(0)+"k"} />
                  <Tooltip {...ttStyle} formatter={(v) => [fmt(v), cat.label]} labelFormatter={d => d} />

            </div>

            {/* Tabulka */}
            <div style={{ background: T.card, border: "1px solid " + (activeCat !== "vse" ? cat.color + "40" : T.border), borderRadius: 16, padding: 20, marginBottom: 20, transition: "border-color 0.2s" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 2 }}>Přehled investic

                  </div>

                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

                          <div>
                            <div style={{ fontSize: 11, color: T.subtle, marginBottom: 2 }}>Výnos</div>
                            <div style={{ fontSize: 14, color: gc, fontWeight: 700, fontFamily: "'DM Mono',monospace" }}>{hasGain ? (gainPct >= 0 ? "+" : "") + gainPct.toFixed(1) + "%" : "—"}</div>
                          </div>
                          <div>
                            <div style={{ fontSize: 11, color: T.subtle, marginBottom: 2 }}>p.a.</div>
                            <div style={{ fontSize: 14, color: cagr !== null ? gc : T.muted, fontFamily: "'DM Mono',monospace" }}>{cagr !== null ? (cagr >= 0 ? "+" : "") + cagr.toFixed(1) + "%" : "—"}</div>
                          </div>
                        </div>
                      </div>

                  })}
                  {/* Footer součet */}
                  {(() => {

                    return (

                        <div><div style={{ fontSize: 11, color: T.subtle }}>Investováno</div><div style={{ fontSize: 14, color: T.muted, fontFamily: "'DM Mono',monospace" }}>{fmt(fInv)}</div></div>
                        <div><div style={{ fontSize: 11, color: T.subtle }}>Hodnota</div><div style={{ fontSize: 14, color: T.text, fontWeight: 700, fontFamily: "'DM Mono',monospace" }}>{fmt(fVal)}</div></div>
                        <div><div style={{ fontSize: 11, color: T.subtle }}>Výnos</div><div style={{ fontSize: 14, color: T.green, fontWeight: 700, fontFamily: "'DM Mono',monospace" }}>+{fGp.toFixed(1)}%</div></div>
                      </div>
                    );
                  })()}
                </div>
              ) : (
                /* Desktop: tabulka */
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 700 }}>
                    <thead>
                      <tr style={{ borderBottom: "1px solid " + T.border }}>
                        <th style={{ padding: "8px 12px", textAlign: "left", fontSize: 12, color: T.muted, fontWeight: 600, letterSpacing: "0.08em" }}>#</th>
                        {COLS.map(c => (
                          <th key={c.key} onClick={() => onSort(c.key)}
                            style={{ padding: "8px 12px", textAlign: c.align, fontSize: 12, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", cursor: "pointer", userSelect: "none", whiteSpace: "nowrap",
                              color: tblSort === c.key ? T.text : T.muted, transition: "color 0.1s" }}>

                        const share   = (p.valueCZK / totalValue) * 100;
                        const gc = (gainPct === null || gainPct >= 0) ? T.green : T.red;
                        return (
                          <tr key={p.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)", transition: "background 0.1s" }}

                                <div>

                                  {p.shares != null && p.shares > 0 && <div style={{ fontSize: 11, color: T.subtle, fontFamily: "'DM Mono',monospace", marginTop: 1 }}>{Number.isInteger(p.shares) ? p.shares : p.shares.toFixed(4)} ks</div>}
                                </div>
                              </div>
                            </td>
                            <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 14, color: T.muted, fontFamily: "'DM Mono',monospace" }}>{fmt(p.investedCZK)}</td>

                            {(() => { const yrs = Math.max(1, NOW_YEAR - (p.start || NOW_YEAR)); const gp = p.gainPctOrig; const ratio = gp !== null && gp !== undefined ? gp / 100 + 1 : null; const cagr = (ratio !== null && ratio > 0) ? (Math.pow(ratio, 1 / yrs) - 1) * 100 : null; return <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 14, color: cagr !== null ? gc : T.muted, fontFamily: "'DM Mono',monospace" }}>{cagr !== null ? (cagr >= 0 ? "+" : "") + cagr.toFixed(2) + "%" : "—"}</td>; })()}

                        <td colSpan={2} style={{ padding: "10px 12px", fontSize: 13, color: T.green, fontWeight: 700, letterSpacing: "0.06em" }}>CELKEM · {sortedRows.length} POZIC</td>
                        {(() => {
                          const fInv = sortedRows.reduce((s,p) => s+p.investedCZK, 0);
                          const fVal = sortedRows.reduce((s,p) => s+p.valueCZK, 0);
                          return (<>
                            <td style={{ ...nc(T.muted), padding: "10px 12px" }}>{fmt(fInv)}</td>
                            <td style={{ ...nc(T.text), padding: "10px 12px", fontSize: 16, fontWeight: 800 }}>{fmt(fVal)}</td>
                            <td style={{ ...nc(T.green), padding: "10px 12px" }}>+{fmt(fVal - fInv)}</td>
                            <td style={{ ...nc(T.green), padding: "10px 12px", fontWeight: 700 }}>+{fInv > 0 ? (((fVal-fInv)/fInv)*100).toFixed(2) : "0.00"}%</td>
                            <td style={{ padding: "10px 12px" }} />
                          </>);
                        })()}
                        <td colSpan={1} />
                      </tr>
                    </tfoot>
                  </table>
                </div>
              )}
            </div>
          </>);
          })()}
          </>);
        })()}

        {/* Projections */}
        {(() => {
          const base    = totalValue;
          const rateAvg = avgAnnReturnNoCrypto / 100;
          const rate10  = customRate10 / 100;
          const annual  = monthlyContrib * 12;
          const years   = [2026,2027,2028,2029,2030,2031,2032];
          const fv = (rate, i) => {
            const lump    = base * Math.pow(1 + rate, i);
            const contrib = i === 0 ? 0 : annual * ((Math.pow(1 + rate, i) - 1) / rate);
            return Math.round(lump + contrib);
          };
          const projData = years.map((yr, i) => ({
            rok: String(yr),
            avg:     fv(rateAvg, i),
            r10:     fv(rate10,  i),
            avgBase: Math.round(base * Math.pow(1 + rateAvg, i)),
            r10Base: Math.round(base * Math.pow(1 + rate10,  i)),
          }));
          const fmtP = v => { const c = typeof fmt === "function" ? fmt(v) : v; return c; };
          const commitContrib = () => { const n = parseFlt(contribDraft); if (!isNaN(n) && n >= 0) setMonthlyContrib(n); setEditingContrib(false); };
          const commitRate10 = () => { const n = parseFlt(rate10Draft); if (!isNaN(n) && n > 0 && n <= 100) setCustomRate10(n); setEditingRate10(false); };

          return (
            <div>
              {/* Contrib row */}
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14, padding: "14px 20px", background: T.card, border: "1px solid " + T.border, borderRadius: 12 }}>

                <div style={{ flex: 1 }} />
                {editingContrib ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input autoFocus type="text" value={contribDraft}
                      onChange={e => setContribDraft(e.target.value)}
                      onBlur={commitContrib}
                      onKeyDown={e => { if (e.key === "Enter") commitContrib(); if (e.key === "Escape") setEditingContrib(false); }}
                      style={{ background: T.bg, border: "1px solid " + T.blue, borderRadius: 8, color: T.text, fontFamily: "'DM Mono',monospace", fontSize: 16, padding: "6px 12px", width: 130, outline: "none", textAlign: "right" }} />
                    <span style={{ fontSize: 14, color: T.blue, fontWeight: 600 }}>Kč / měs</span>
                  </div>

                            domain={[

                            tickFormatter={v => v >= 1000000 ? (v/1000000).toFixed(1)+"M" : (v/1000).toFixed(0)+"k"} />

                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                        {projData.filter((_, i) => i > 0).map((pt, idx) => {

  // ── POZICE ───────────────────────────────────────────────────────────────────
  const tabPozice = () => {

    const importedInvested = importedRows.reduce((s,p) => {

            <tbody>

                    onMouseLeave={e => e.currentTarget.style.background = ""}>

                    <EditCell value={pos.value}    color={T.text}  onSave={v => updateManual(pos.id,"value",v)} />
                    <EditCell value={Math.round(gain)} color={gc} onSave={v => updateManual(pos.id,"gain",v)} />
                    <td style={{ ...nc(gc), fontWeight: 700 }}>{gainPct >= 0 ? "+" : ""}{gainPct.toFixed(2)}%</td>

                <td style={nc(T.muted)}>{fmt(manualInvested)}</td>
                <td colSpan={2} />

        </div>

                  try {

                    let id = 500;
                    const newPos = agg.map(p => ({
                      id: id++, name: p.name, broker: p.broker, category: p.category,

                      value:    Math.round(p.invested * 100) / 100,

                      ticker: p.ticker,

                    setImportedRows(newPos);
                    setGsMsg("✓ CSV načteno — " + newPos.length + " pozic. Ulož do Sheets.");

              {gsStatus === "saving" ? "⟳ Ukládám…" : gsStatus === "saved" ? "✓ Uloženo" : "↑ Uložit do Sheets"}

        <div className="ib-table-wrap" style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, overflow: "hidden", marginBottom: 20 }}>

              <tr style={{ borderBottom: "1px solid " + T.border }}>
                {["Název / Ticker","Broker","Kategorie","Kusy","Investováno","Invest. CZK","Hodnota CZK","Výnos CZK","Výnos %","Od"].map((h, i) => (

                ))}
              </tr>
            </thead>
            <tbody>
              {importedRows.map(pos => {
                const rate     = (isFinite(pos.fx) && pos.fx > 0) ? pos.fx : (pos.currency === "EUR" ? DEGIRO_FX : pos.currency === "GBP" ? GBP_FX : ETORO_FX);
                const invCZK   = isFinite(pos.invested) ? pos.invested * rate : 0;
                const hasPrice = isFinite(pos.priceCZK) && pos.priceCZK > 0 && isFinite(pos.shares) && pos.shares > 0;
                const valueCZK = hasPrice ? pos.priceCZK * pos.shares : invCZK;
                const gainCZK  = valueCZK - invCZK;
                // Výnos % počítáme v PŮVODNÍ měně (ne CZK), aby zkreslení kurzu neovlivnilo %
                // valueOrig = priceCZK / rate * shares (zpět do orig měny) nebo invOrig = pos.invested
                const valueOrig = hasPrice && rate > 0 ? (pos.priceCZK * pos.shares) / rate : pos.invested;
                const gainPct  = pos.invested > 0 ? ((valueOrig - pos.invested) / pos.invested) * 100 : 0;
                const sharePct = totalValue > 0 ? (valueCZK / totalValue) * 100 : 0;
                const years    = Math.max(1, new Date().getFullYear() - (pos.start || 2024));
                const annR     = hasPrice && pos.invested > 0 ? (Math.pow(valueOrig / pos.invested, 1 / years) - 1) * 100 : null;

                return (

                  </tr>

        {/* Majetek a závazky */}

                    <td style={{ padding:"13px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>investováno {fmt(totalInvested)}</td>
                  </tr>
                  <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                    <td style={{ padding:"13px 20px", fontSize:13, color:T.muted }}>Zůstatek na účtu</td>

                    <td style={{ padding:"13px 20px", fontSize:13, color:T.muted }}>Zůstatek hypotéky</td>
                    <td style={{ padding:"4px 12px", textAlign:"right" }}>
                      <input type="text" defaultValue={hypoteka} onBlur={e=>{ const n=parseFlt(e.target.value); if(n>=0) setHypoteka(n); }}
                        style={{ background:"transparent", border:"1px dashed rgba(255,255,255,0.15)", borderRadius:6, color:T.red, fontFamily:"'DM Mono',monospace", fontSize:15, fontWeight:700, padding:"4px 10px", textAlign:"right", outline:"none", width:200 }} />
                    </td>
                    <td style={{ padding:"13px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>aktuální dluh</td>
                  </tr>
                  <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.04)", background:"rgba(255,255,255,0.015)" }}>
                    <td style={{ padding:"13px 20px", fontSize:13, color:T.muted }}>Hodnota majetku celkem</td>
                    <td style={{ padding:"13px 20px", fontSize:15, fontWeight:700, color:T.text, fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{fmt(hodnotaMajetku)}</td>
                    <td style={{ padding:"13px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>portfolio + hotovost</td>
                  </tr>
                  <tr style={{ background:"rgba(34,197,94,0.04)" }}>
                    <td style={{ padding:"14px 20px", fontSize:14, fontWeight:700, color:T.text }}>Čistý majetek</td>
                    <td style={{ padding:"14px 20px", fontSize:20, fontWeight:800, color:cistyMajetek>=0?T.green:T.red, fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{fmt(cistyMajetek)}</td>
                    <td style={{ padding:"14px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>majetek − hypotéka</td>
                  </tr>
                </tbody>
              </table>
            </div>
          );
        })()}
      </div>
    );
  };

  // ── ANALÝZA ──────────────────────────────────────────────────────────────────
  const tabAnalyza = () => {
    const sorted    = allRows.slice().sort((a,b) => b.valueCZK - a.valueCZK);
    const posCount  = allRows.length;
    const profitable = allRows.filter(p => p.valueCZK > p.investedCZK).length;
    const avgHold   = allRows.reduce((s,p) => s + (NOW_YEAR - p.start), 0) / Math.max(posCount, 1);
    const oldest    = allRows.slice().sort((a,b) => a.start - b.start)[0];
    const newest    = allRows.slice().sort((a,b) => b.start - a.start)[0];

    const catMap = {};
    allRows.forEach(p => { catMap[p.category] = (catMap[p.category] || 0) + p.valueCZK; });
    const catEntries = Object.keys(catMap).map(k => [k, catMap[k]]).sort((a,b) => b[1] - a[1]);

    const rate = avgAnnReturnNoCrypto / 100;
    const milestones = [3000000, 5000000, 10000000];
    const milColors  = [T.green, T.amber, "#ec4899"];

    const barData = sorted.slice(0,12).map(p => ({
      name: p.name.split("(")[0].trim().slice(0,10),
      Investováno: p.investedCZK,
      Hodnota: p.valueCZK,
      cat: p.category,
    }));

    const C = { background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 20 };

    // Koláče – broker + kategorie (stejná data jako v tabPrehled)
    const brokerMap2 = {};
    const catMap2 = {};
    allRows.forEach(p => {
      brokerMap2[p.broker] = (brokerMap2[p.broker] || 0) + p.valueCZK;
      catMap2[p.category]  = (catMap2[p.category]  || 0) + p.valueCZK;
    });
    const brokerData2 = Object.keys(brokerMap2).map(k => ({ name: k, value: brokerMap2[k] })).sort((a,b) => b.value - a.value);
    const catData2    = Object.keys(catMap2).map(k => ({ name: k, value: catMap2[k] })).sort((a,b) => b.value - a.value);

    const PieTooltip2 = ({ active, payload }) => {
      if (!active || !payload || !payload.length) return null;
      const d = payload[0];
      return (
        <div style={{ background: T.card, border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 14px", fontFamily: "'DM Mono',monospace", fontSize: 13 }}>
          <div style={{ color: T.text, marginBottom: 3, fontWeight: 600 }}>{d.name}</div>
          <div style={{ color: T.green }}>{fmt(d.value)}</div>
          <div style={{ color: T.muted, marginTop: 2 }}>{((d.value / totalValue) * 100).toFixed(1)} %</div>
        </div>
      );
    };

    // Největší a nejmenší pozice
    const biggest  = sorted[0];
    const smallest = sorted[sorted.length - 1];

    return (
      <div>
        <div style={{ marginBottom: 28 }}>
          <h1 style={{ fontSize: 27, fontWeight: 800, color: T.text, letterSpacing: "-0.02em" }}>Analýza portfolia</h1>
          <div style={{ fontSize: 14, color: T.muted, marginTop: 4 }}>{posCount} pozic · průměrné držení {avgHold.toFixed(1)} let</div>
        </div>

        {/* Stats cards row */}
        <div className="ib-grid4" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 16 }}>
          <StatCard label="Největší pozice"
            value={biggest ? biggest.name.split("(")[0].trim() : "—"}
            sub={biggest ? fmt(biggest.valueCZK) + " · " + ((biggest.valueCZK/totalValue)*100).toFixed(1) + "%" : ""}
            color={T.green} accent={T.green} />
          <StatCard label="Nejmenší pozice"
            value={smallest ? smallest.name.split("(")[0].trim() : "—"}
            sub={smallest ? fmt(smallest.valueCZK) + " · " + ((smallest.valueCZK/totalValue)*100).toFixed(1) + "%" : ""}
            color={T.muted} accent={T.subtle} />
          <StatCard label="Nejstarší pozice"  value={oldest ? oldest.name.split("(")[0].trim() : "—"} sub={oldest ? String(oldest.start) : ""} color={T.muted} accent={T.subtle} />
          <StatCard label="Nejnovější pozice" value={newest ? newest.name.split("(")[0].trim() : "—"} sub={newest ? String(newest.start) : ""} color={T.muted} accent={T.subtle} />
        </div>

        {/* Koláče Podle brokera + Podle kategorie */}
        <div className="ib-grid2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
          {[
            { title: "Podle brokera",   data: brokerData2, colorFn: (_, i) => BROKER_COLORS[i % BROKER_COLORS.length] },
            { title: "Podle kategorie", data: catData2,    colorFn: (d)    => CAT_COLOR[d.name] || T.muted },
          ].map(cfg => (
            <div key={cfg.title} style={{ ...C }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: T.text, marginBottom: 16 }}>{cfg.title}</div>
              <ResponsiveContainer width="100%" height={140}>
                <PieChart>
                  <Pie data={cfg.data} dataKey="value" cx="50%" cy="50%" innerRadius={40} outerRadius={62} paddingAngle={2}>
                    {cfg.data.map((d, i) => <Cell key={i} fill={cfg.colorFn(d, i)} />)}
                  </Pie>
                  <Tooltip content={<PieTooltip2 />} />
                </PieChart>
              </ResponsiveContainer>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 12 }}>
                {cfg.data.map((d, i) => {
                  const c = cfg.colorFn(d, i);
                  return (
                    <div key={d.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <div style={{ width: 8, height: 8, borderRadius: 2, background: c, flexShrink: 0 }} />
                        <span style={{ fontSize: 14, color: T.muted }}>{d.name}</span>
                      </div>
                      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <span style={{ fontSize: 13, color: T.subtle }}>{fmt(d.value)}</span>
                        <span style={{ fontSize: 14, fontWeight: 600, color: T.text, fontFamily: "'DM Mono',monospace", minWidth: 38, textAlign: "right" }}>{((d.value/totalValue)*100).toFixed(1)}%</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        {/* Nejlepší vs. nejhorší pozice */}
        {(() => {
          const byGain = allRows.slice().sort((a,b) => b.gainPctOrig - a.gainPctOrig);
          const top3   = byGain.slice(0, 3);
          const bot3   = byGain.slice(-3).reverse();
          const Row = ({ p, rank, isTop }) => {
            const gp = p.gainPctOrig !== null && p.gainPctOrig !== undefined ? p.gainPctOrig : 0;
            const yrs = Math.max(1, NOW_YEAR - (p.start || NOW_YEAR));
            const ratio = gp / 100 + 1;
            const cagr = ratio > 0 ? (Math.pow(ratio, 1 / yrs) - 1) * 100 : 0;
            const gc = isTop ? T.green : T.red;
            return (
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 10, background: isTop ? "rgba(34,197,94,0.04)" : "rgba(239,68,68,0.04)", border: "1px solid " + (isTop ? "rgba(34,197,94,0.1)" : "rgba(239,68,68,0.1)"), marginBottom: 8 }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: gc, opacity: 0.5, minWidth: 24, textAlign: "center" }}>{rank}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, color: T.text, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name.split("(")[0].trim()}</div>
                  <div style={{ fontSize: 12, color: T.muted, marginTop: 1 }}>{p.category} · {p.broker} · od {p.start}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: gc, fontFamily: "'DM Mono',monospace" }}>{gp >= 0 ? "+" : ""}{gp.toFixed(1)}%</div>
                  <div style={{ fontSize: 12, color: T.muted, fontFamily: "'DM Mono',monospace" }}>{cagr >= 0 ? "+" : ""}{cagr.toFixed(1)}% p.a.</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0, minWidth: 80 }}>
                  <div style={{ fontSize: 14, color: T.text, fontFamily: "'DM Mono',monospace" }}>{fmt(p.valueCZK)}</div>
                  <div style={{ fontSize: 12, color: gc, fontFamily: "'DM Mono',monospace" }}>{gp >= 0 ? "+" : ""}{fmt(p.valueCZK - p.investedCZK)}</div>
                </div>
              </div>
            );
          };
          return (
            <div className="ib-grid2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
              <div style={{ ...C }}>
                <SectionTitle title="🏆 Top 3 — nejlepší výnos" sub="Podle celkového výnosu %" />
                {top3.map((p, i) => <Row key={p.id} p={p} rank={i + 1} isTop={true} />)}
              </div>
              <div style={{ ...C }}>
                <SectionTitle title="📉 Bottom 3 — nejhorší výnos" sub="Podle celkového výnosu %" />
                {bot3.map((p, i) => <Row key={p.id} p={p} rank={i + 1} isTop={false} />)}
              </div>
            </div>
          );
        })()}

        {/* Milestone tracker */}
        <div style={{ ...C, marginBottom: 16 }}>
          <SectionTitle title="Milestone tracker" sub={"Odhad při " + avgAnnReturnNoCrypto.toFixed(2) + " % p.a. · aktuálně " + fmt(totalValue)} />
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {milestones.map((target, i) => {
              const reached = totalValue >= target;
              const pct = Math.min((totalValue / target) * 100, 100);
              const yrs = reached ? null : Math.log(target / totalValue) / Math.log(1 + rate);
              const c = milColors[i];
              return (
                <div key={target}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 22 }}>{reached ? "✅" : ["🎯","🚀","💎"][i]}</span>
                      <div>
                        <div style={{ fontSize: 16, color: T.text, fontWeight: 700 }}>{(target/1000000).toFixed(0)} M CZK</div>
                        <div style={{ fontSize: 12, color: reached ? T.green : T.muted }}>
                          {reached ? "Dosaženo ✓" : "za ~" + yrs.toFixed(1) + " let · rok " + Math.ceil(NOW_YEAR + yrs)}
                        </div>
                      </div>
                    </div>
                    <span style={{ fontSize: 16, color: c, fontWeight: 800, fontFamily: "'DM Mono',monospace" }}>{pct.toFixed(0)}%</span>
                  </div>
                  <div style={{ height: 6, background: "rgba(255,255,255,0.05)", borderRadius: 3 }}>
                    <div style={{ width: pct+"%", height: "100%", background: c, borderRadius: 3 }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Roční výkonnost portfolia */}
        {(() => {
          // Vezmi vždy první dostupný bod každého roku z PORTFOLIO_HISTORY
          const years = {};
          PORTFOLIO_HISTORY.forEach(p => {
            const yr = p.d.split("-")[0];
            if (!years[yr]) years[yr] = p;
          });
          // Přidej aktuální hodnotu jako "2026 YTD"
          years["2026"] = PORTFOLIO_HISTORY[PORTFOLIO_HISTORY.length - 1];

          const yearKeys = Object.keys(years).sort();
          const yearData = yearKeys.map((yr, i) => {
            const cur  = years[yr].v;
            const prev = i > 0 ? years[yearKeys[i-1]].v : null;
            const growthPct = prev ? ((cur - prev) / prev) * 100 : null;
            const growthAbs = prev ? cur - prev : null;
            return { yr, cur, prev, growthPct, growthAbs };
          }).filter(d => d.growthPct !== null);  // první rok nemá srovnání

          const maxGrowth = Math.max(...yearData.map(d => Math.abs(d.growthPct)));

          return (
            <div style={{ ...C, marginBottom: 16 }}>
              <SectionTitle title="Roční výkonnost portfolia" sub="Meziroční změna hodnoty portfolia" />

              {/* Bar chart meziroční % */}
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={yearData} margin={{ left: 4, right: 4, top: 4, bottom: 0 }} barCategoryGap="30%">
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
                  <XAxis dataKey="yr" tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.tick }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.tick }} axisLine={false} tickLine={false} width={40}
                    tickFormatter={v => v.toFixed(0) + "%"} />
                  <Tooltip {...ttStyle} formatter={(v) => [v.toFixed(1) + " %", "Meziroční růst"]} />
                  <Bar dataKey="growthPct" radius={[4,4,0,0]}>
                    {yearData.map((d, i) => <Cell key={i} fill={d.growthPct >= 0 ? T.green : T.red} fillOpacity={0.8} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>

              {/* Tabulka po letech */}
              <div style={{ display: "flex", flexDirection: "column", gap: 0, marginTop: 16 }}>
                {/* Header */}
                <div style={{ display: "grid", gridTemplateColumns: "60px 1fr 100px 120px 80px", gap: 8, padding: "6px 12px", borderBottom: "1px solid " + T.border }}>
                  {["Rok","Hodnota portfolia","Meziroční %","Přírůstek","Bar"].map(h => (
                    <div key={h} style={{ fontSize: 11, color: T.subtle, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", textAlign: h === "Rok" ? "left" : "right" }}>{h}</div>
                  ))}
                </div>
                {yearData.map((d, i) => {
                  const gc = d.growthPct >= 0 ? T.green : T.red;
                  const barW = Math.abs(d.growthPct) / maxGrowth * 100;
                  return (
                    <div key={d.yr} style={{ display: "grid", gridTemplateColumns: "60px 1fr 100px 120px 80px", gap: 8, padding: "10px 12px",
                      borderBottom: "1px solid rgba(255,255,255,0.03)", background: i % 2 === 0 ? "rgba(255,255,255,0.01)" : "transparent" }}>
                      <div style={{ fontSize: 14, color: T.muted, fontWeight: 700 }}>{d.yr}</div>
                      <div style={{ textAlign: "right", fontSize: 14, color: T.text, fontFamily: "'DM Mono',monospace", fontWeight: 600 }}>{fmt(d.cur)}</div>
                      <div style={{ textAlign: "right", fontSize: 14, color: gc, fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>
                        {d.growthPct >= 0 ? "+" : ""}{d.growthPct.toFixed(1)}%
                      </div>
                      <div style={{ textAlign: "right", fontSize: 13, color: gc, fontFamily: "'DM Mono',monospace" }}>
                        {d.growthAbs >= 0 ? "+" : ""}{fmt(d.growthAbs)}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end" }}>
                        <div style={{ width: barW + "%", height: 6, background: gc, borderRadius: 3, opacity: 0.7, minWidth: 2 }} />
                      </div>
                    </div>
                  );
                })}
                {/* Celkový řádek */}
                {(() => {
                  const first = PORTFOLIO_HISTORY[0].v;
                  const last  = PORTFOLIO_HISTORY[PORTFOLIO_HISTORY.length - 1].v;
                  const totalGrowth = ((last - first) / first) * 100;
                  const years = PORTFOLIO_HISTORY.length > 1 ? (new Date(PORTFOLIO_HISTORY[PORTFOLIO_HISTORY.length-1].d+"-01") - new Date(PORTFOLIO_HISTORY[0].d+"-01")) / (1000*60*60*24*365.25) : 1;
                  const cagr = (Math.pow(last/first, 1/years) - 1) * 100;
                  return (
                    <div style={{ display: "grid", gridTemplateColumns: "60px 1fr 100px 120px 80px", gap: 8, padding: "12px 12px",
                      borderTop: "2px solid rgba(34,197,94,0.2)", background: "rgba(34,197,94,0.04)", borderRadius: "0 0 10px 10px" }}>
                      <div style={{ fontSize: 13, color: T.green, fontWeight: 700 }}>Celkem</div>
                      <div style={{ textAlign: "right", fontSize: 14, color: T.text, fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>{fmt(last)}</div>
                      <div style={{ textAlign: "right", fontSize: 14, color: T.green, fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>+{totalGrowth.toFixed(1)}%</div>
                      <div style={{ textAlign: "right", fontSize: 13, color: T.green, fontFamily: "'DM Mono',monospace" }}>+{fmt(last - first)}</div>
                      <div style={{ textAlign: "right", fontSize: 11, color: T.muted, fontFamily: "'DM Mono',monospace" }}>CAGR {cagr.toFixed(1)}%</div>
                    </div>
                  );
                })()}
              </div>
            </div>
          );
        })()}

        {/* Bar chart */}
        <div style={{ ...C, marginBottom: 16 }}>
          <SectionTitle title="Top 12 — investováno vs. hodnota" sub="Porovnání vložené částky a aktuální hodnoty" />
          <ResponsiveContainer width="100%" height={230}>
            <BarChart data={barData} barCategoryGap="28%">
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
              <XAxis dataKey="name" tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.tick }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.tick }} axisLine={false} tickLine={false} tickFormatter={v => (v/1000).toFixed(0)+"k"} width={40} />
              <Tooltip {...ttStyle} formatter={(v, name) => [fmt(v), name]} />
              <Bar dataKey="Investováno" fill="rgba(107,114,128,0.35)" radius={[3,3,0,0]} />
              <Bar dataKey="Hodnota" radius={[3,3,0,0]}>
                {barData.map((d, i) => <Cell key={i} fill={CAT_COLOR[d.cat] || T.green} fillOpacity={0.85} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    );
  };

  // ── PENZIJKO TAB ────────────────────────────────────────────────────────────
  const tabPenzijko = () => {
    const C = { background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: "20px 22px", marginBottom: 16 };
    const PURPLE = "#a78bfa";
    const PURPLE_DIM = "rgba(167,139,250,0.15)";
    const PURPLE_BORDER = "rgba(167,139,250,0.25)";

    // Jen první účet – lze rozšířit na více
    const acc = pensionAccounts[0];
    if (!acc) return <div style={{ color: T.muted, padding: 40 }}>Žádný penzijní účet.</div>;

    const entries = [...(acc.entries || [])].sort((a, b) => a.label.localeCompare(b.label));
    const currentValue = entries.length ? entries[entries.length - 1].amount : 0;
    const firstValue   = entries.length ? entries[0].amount : 0;
    const totalGrowth  = firstValue > 0 ? ((currentValue - firstValue) / firstValue) * 100 : 0;

    // Průměrný měsíční přírůstek (z po sobě jdoucích záznamů)
    const diffs = entries.slice(1).map((e, i) => e.amount - entries[i].amount).filter(d => d > 0);
    const avgMonthly = diffs.length ? diffs.reduce((s,d)=>s+d,0) / diffs.length : 0;

    // Odhad na konec roku / za 5 let
    const monthsToYearEnd = 12 - new Date().getMonth();
    const projYear  = currentValue + avgMonthly * monthsToYearEnd;
    const proj5     = currentValue + avgMonthly * 12 * 5;

    // Celkový vložený kapitál (moje + zaměstnavatel + stát)
    const totalIn = (acc.myTotal||0) + (acc.employerTotal||0) + (acc.stateTotal||0);
    const appreciation = acc.appreciation || (currentValue - totalIn);

    // CAGR – roční výnos zhodnocení
    // Počítáme z celkového vloženého kapitálu vs. aktuální hodnota, přes počet let spoření
    const spendingYears = Math.max(1, NOW_YEAR - (acc.startYear || 2006));
    const cagrRaw = totalIn > 0 && currentValue > 0
      ? (Math.pow(currentValue / totalIn, 1 / spendingYears) - 1) * 100
      : null;
    // CAGR z historických záznamů (první → poslední)
    const histYears = entries.length >= 2
      ? (() => {
          const [fy, fm] = entries[0].label.split("-").map(Number);
          const [ly, lm] = entries[entries.length-1].label.split("-").map(Number);
          return Math.max(0.08, (ly - fy) + (lm - fm) / 12);
        })()
      : null;
    const cagrHist = histYears && firstValue > 0 && currentValue > 0
      ? (Math.pow(currentValue / firstValue, 1 / histYears) - 1) * 100
      : null;

    // Graf data
    const chartData = entries.map(e => ({ label: e.label, hodnota: e.amount }));

    // Pomocník pro editaci metadata
    const updateMeta = (field, raw) => {
      setPensionAccounts(prev => prev.map(a => a.id !== acc.id ? a : { ...a, [field]: parseFlt(raw)||0 }));
    };

    return (
      <div>
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 800, color: T.text, letterSpacing: "-0.02em" }}>{acc.name}</h1>
            <div style={{ fontSize: 13, color: T.muted, marginTop: 4 }}>Doplňkové penzijní spoření · od {acc.startYear}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 32, fontWeight: 800, color: PURPLE, fontFamily: "'DM Mono',monospace", letterSpacing: "-0.02em" }}>{fmt(currentValue)}</div>
            <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>aktuální hodnota · {entries.length > 0 ? entries[entries.length-1].label : "—"}</div>
          </div>
        </div>

        {/* KPI karty */}
        <div className="ib-pension-kpi" style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 12, marginBottom: 16 }}>
          <StatCard label="Celkem vloženo"          value={fmt(totalIn)}     color={T.muted}  accent={T.subtle} sub={`já ${fmt(acc.myTotal||0)} + zaměst. ${fmt(acc.employerTotal||0)}`} />
          <StatCard label="Státní příspěvky"        value={fmt(acc.stateTotal||0)} color={T.amber}  accent={T.amber} />
          <StatCard label="Zhodnocení celkem"       value={fmt(appreciation)} color={T.green}  accent={T.green}  sub={totalIn > 0 ? "+" + ((appreciation/totalIn)*100).toFixed(1) + " % z vkladu" : ""} />
          <StatCard label="Průměrný roční výnos (CAGR)" value={cagrRaw !== null ? "+" + cagrRaw.toFixed(2) + " %" : "—"} color={T.green} accent={T.green} sub={`od ${acc.startYear||2006} · ${spendingYears} let`} />
          <StatCard label="Průměr. měs. přírůstek" value={fmt(avgMonthly)}   color={PURPLE}   accent={PURPLE}   sub={cagrHist !== null ? "hist. CAGR +" + cagrHist.toFixed(2) + " %" : "z historických dat"} />
        </div>

        {/* Graf vývoje */}
        <div style={{ ...C }}>
          <SectionTitle title="Vývoj hodnoty portfolia" sub="Historické záznamy aktuální hodnoty" />
          {entries.length >= 2 ? (
            <ResponsiveContainer width="100%" height={220}>
              <AreaChart data={chartData} margin={{ left: 10, right: 10, top: 4, bottom: 0 }}>
                <defs>
                  <linearGradient id="gPension" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={PURPLE} stopOpacity={0.25} />
                    <stop offset="100%" stopColor={PURPLE} stopOpacity={0.02} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
                <XAxis dataKey="label" tick={{ fontFamily: "'DM Mono',monospace", fontSize: 11, fill: T.tick }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fontFamily: "'DM Mono',monospace", fontSize: 11, fill: T.tick }} axisLine={false} tickLine={false} width={60}
                  tickFormatter={v => v >= 1000000 ? (v/1000000).toFixed(2)+"M" : (v/1000).toFixed(0)+"k"} />
                <Tooltip contentStyle={{ background: T.card, border: "1px solid " + PURPLE_BORDER, borderRadius: 10, fontFamily: "'DM Mono',monospace", fontSize: 12 }}
                  formatter={v => [fmt(v), "Hodnota"]} />
                <Area type="monotone" dataKey="hodnota" stroke={PURPLE} strokeWidth={2.5} fill="url(#gPension)"
                  dot={{ r: 5, fill: PURPLE, strokeWidth: 0 }} activeDot={{ r: 7, fill: PURPLE, strokeWidth: 0 }} />
              </AreaChart>
            </ResponsiveContainer>
          ) : (
            <div style={{ padding: "40px 0", textAlign: "center", color: T.muted, fontSize: 13 }}>Přidej alespoň 2 záznamy pro zobrazení grafu.</div>
          )}
        </div>

        {/* Meziroční přírůstky tabulka */}
        {entries.length >= 2 && (
          <div style={{ ...C }}>
            <SectionTitle title="Mezizáznamové přírůstky" sub="Změna hodnoty mezi záznamy" />
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: "1px solid " + T.border }}>
                  {["Období","Hodnota","Přírůstek","Přírůstek %"].map((h, i) => (
                    <th key={i} style={{ padding: "7px 12px", textAlign: i === 0 ? "left" : "right", fontSize: 10, color: T.muted, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {entries.map((e, i) => {
                  const prev = i > 0 ? entries[i-1].amount : null;
                  const diff = prev !== null ? e.amount - prev : null;
                  const diffPct = prev !== null && prev > 0 ? ((e.amount - prev) / prev * 100) : null;
                  const gc = diff !== null ? (diff >= 0 ? T.green : T.red) : T.muted;
                  return (
                    <tr key={e.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)" }}
                      onMouseEnter={el => el.currentTarget.style.background = "rgba(167,139,250,0.03)"}
                      onMouseLeave={el => el.currentTarget.style.background = ""}>
                      <td style={{ padding: "9px 12px", fontSize: 13, color: T.muted, fontFamily: "'DM Mono',monospace" }}>{e.label}</td>
                      <td style={{ padding: "9px 12px", textAlign: "right", fontSize: 14, color: T.text, fontWeight: 700, fontFamily: "'DM Mono',monospace" }}>{fmt(e.amount)}</td>
                      <td style={{ padding: "9px 12px", textAlign: "right", fontSize: 13, color: gc, fontFamily: "'DM Mono',monospace" }}>
                        {diff !== null ? (diff >= 0 ? "+" : "") + fmt(diff) : "—"}
                      </td>
                      <td style={{ padding: "9px 12px", textAlign: "right", fontSize: 13, color: gc, fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>
                        {diffPct !== null ? (diffPct >= 0 ? "+" : "") + diffPct.toFixed(2) + "%" : "—"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{ borderTop: "1px solid " + PURPLE_BORDER, background: PURPLE_DIM }}>
                  <td style={{ padding: "9px 12px", fontSize: 12, color: PURPLE, fontWeight: 700 }}>CELKOVÝ RŮST</td>
                  <td style={{ padding: "9px 12px", textAlign: "right", fontSize: 14, color: T.text, fontWeight: 800, fontFamily: "'DM Mono',monospace" }}>{fmt(currentValue)}</td>
                  <td style={{ padding: "9px 12px", textAlign: "right", fontSize: 13, color: T.green, fontFamily: "'DM Mono',monospace" }}>+{fmt(currentValue - firstValue)}</td>
                  <td style={{ padding: "9px 12px", textAlign: "right", fontFamily: "'DM Mono',monospace" }}>
                    <div style={{ fontSize: 13, color: T.green, fontWeight: 700 }}>+{totalGrowth.toFixed(2)}%</div>
                    {cagrHist !== null && <div style={{ fontSize: 11, color: PURPLE, marginTop: 2 }}>CAGR +{cagrHist.toFixed(2)}% p.a.</div>}
                  </td>
                </tr>
              </tfoot>
            </table>
          </div>
        )}

        {/* Projekce */}
        {(() => {
          const projN = currentValue + avgMonthly * 12 * projYears;
          const commitProjYears = () => { const n = parseInt(projYearsDraft); if (n > 0 && n <= 50) setProjYears(n); setEditingProjYears(false); };
          return (
            <div className="ib-grid2 ib-proj-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
              <div style={{ ...C, marginBottom: 0 }}>
                <div style={{ fontSize: 13, color: T.muted, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 12 }}>Projekce – konec roku {NOW_YEAR}</div>
                <div style={{ fontSize: 28, fontWeight: 800, color: PURPLE, fontFamily: "'DM Mono',monospace" }}>{fmt(projYear)}</div>
                <div style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>při průměrném přírůstku {fmt(avgMonthly)}/měs · {monthsToYearEnd} měsíců</div>
              </div>
              <div style={{ ...C, marginBottom: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <span style={{ fontSize: 13, color: T.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Projekce – za</span>
                  {editingProjYears ? (
                    <input autoFocus type="text" value={projYearsDraft}
                      onChange={e => setProjYearsDraft(e.target.value)}
                      onBlur={commitProjYears}
                      onKeyDown={e => { if (e.key === "Enter") commitProjYears(); if (e.key === "Escape") setEditingProjYears(false); }}
                      style={{ background: T.bg, border: "1px solid " + T.amber, borderRadius: 6, color: T.text, fontFamily: "'DM Mono',monospace", fontSize: 15, fontWeight: 700, padding: "2px 8px", width: 48, outline: "none", textAlign: "center" }} />
                  ) : (
                    <span onClick={() => { setProjYearsDraft(String(projYears)); setEditingProjYears(true); }}
                      style={{ padding: "2px 10px", background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 6, cursor: "text", fontFamily: "'DM Mono',monospace", fontSize: 15, color: T.amber, fontWeight: 700 }}>
                      {projYears} ✎
                    </span>
                  )}
                  <span style={{ fontSize: 13, color: T.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>let</span>
                </div>
                <div style={{ fontSize: 28, fontWeight: 800, color: T.amber, fontFamily: "'DM Mono',monospace" }}>{fmt(projN)}</div>
                <div style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>při stejném tempu růstu · rok {NOW_YEAR + projYears}</div>
              </div>
            </div>
          );
        })()}

        {/* Metadata – editovatelná */}
        <div style={{ ...C }}>
          <SectionTitle title="Detaily a příspěvky" sub="Klikni na hodnotu pro editaci" />
          <div className="ib-grid4" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
            {[
              { label: "Můj měs. příspěvek", field: "myContrib", value: acc.myContrib||0, suffix: " Kč/měs" },
              { label: "Přísp. zaměstnavatele", field: "employerContrib", value: acc.employerContrib||0, suffix: " Kč/měs" },
              { label: "Celkem já", field: "myTotal", value: acc.myTotal||0, suffix: " Kč" },
              { label: "Celkem zaměstnavatel", field: "employerTotal", value: acc.employerTotal||0, suffix: " Kč" },
              { label: "Státní příspěvky", field: "stateTotal", value: acc.stateTotal||0, suffix: " Kč" },
              { label: "Zhodnocení", field: "appreciation", value: acc.appreciation||0, suffix: " Kč" },
              { label: "Rok začátku spoření", field: "startYear", value: acc.startYear||2006, suffix: "" },
            ].map(m => (
              <div key={m.field} style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, overflow: "hidden", position: "relative" }}>
                <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: PURPLE, borderRadius: "14px 14px 0 0" }} />
                <div style={{ padding: "14px 14px 4px", fontSize: 11, color: T.muted, letterSpacing: "0.08em", fontWeight: 500, textTransform: "uppercase" }}>{m.label}</div>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <tbody><tr>
                    <EditCell value={m.value} color={PURPLE} suffix={m.suffix} onSave={v => updateMeta(m.field, v)} />
                  </tr></tbody>
                </table>
              </div>
            ))}
          </div>
        </div>

        {/* Přidání záznamu */}
        <div style={{ ...C, border: "1px solid " + PURPLE_BORDER }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <SectionTitle title="Záznamy hodnoty" sub={null} />
            <button onClick={() => {
              setPensionAccounts(prev => prev.map(a => {
                if (a.id !== acc.id) return a;
                const newId = Math.max(0, ...(a.entries||[]).map(e => e.id)) + 1;
                const now = new Date();
                const label = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
                return { ...a, entries: [...(a.entries||[]), { id: newId, label, amount: 0 }] };
              }));
            }}
              style={{ background: T.green, border: "none", borderRadius: 8, color: "#000", cursor: "pointer", padding: "7px 16px", fontSize: 13, fontWeight: 700 }}>
              + Přidat záznam
            </button>
          </div>
          <div style={{ fontSize: 12, color: T.muted, marginBottom: 12 }}>Datum ve formátu RRRR-MM, částka v Kč. Kliknutím na buňku lze editovat.</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {entries.map(entry => (
              <div key={entry.id} style={{ display: "flex", alignItems: "center", gap: 4, background: "rgba(167,139,250,0.06)", border: "1px solid " + PURPLE_BORDER, borderRadius: 8, overflow: "hidden", minWidth: 200 }}>
                <table style={{ borderCollapse: "collapse", flex: 1 }}>
                  <tbody><tr>
                    <EditCell value={entry.label} type="text" align="left" color={T.muted}
                      onSave={v => setPensionAccounts(prev => prev.map(a => a.id!==acc.id?a:{...a,entries:a.entries.map(e=>e.id!==entry.id?e:{...e,label:v})}))} />
                    <EditCell value={entry.amount} color={PURPLE}
                      onSave={v => setPensionAccounts(prev => prev.map(a => a.id!==acc.id?a:{...a,entries:a.entries.map(e=>e.id!==entry.id?e:{...e,amount:parseFlt(v)||0})}))} />
                  </tr></tbody>
                </table>
                <button onClick={() => setPensionAccounts(prev => prev.map(a => a.id!==acc.id?a:{...a,entries:a.entries.filter(e=>e.id!==entry.id)}))}
                  style={{ background: "none", border: "none", color: T.subtle, cursor: "pointer", fontSize: 16, padding: "4px 8px", flexShrink: 0 }}
                  onMouseEnter={e => e.currentTarget.style.color = T.red}
                  onMouseLeave={e => e.currentTarget.style.color = T.subtle}>×</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  const TABS = [
    { id: "portfolio", label: "Přehled" },
    { id: "analyza",   label: "Analýza" },
    { id: "penzijko",  label: "Penzijko" },
    { id: "positions", label: "Pozice" },
  ];

  return (
    <div>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f13; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
        .ib-grid4  { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
        .ib-grid2  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .ib-grid3  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .ib-hdr-fx       { display: flex; align-items: center; gap: 6px; }
        .ib-nav          { display: flex; }
        .ib-tab-bar      { display: none; }
        .ib-hdr-currency { display: flex; }
        .ib-hdr-divider  { display: block; }

        @media (max-width: 480px) {
          /* Základní layout */
          .ib-main   { padding: 12px 12px 76px 12px !important; max-width: 100% !important; }
          .ib-header { padding: 0 12px !important; height: 48px !important; }

          /* Gridy */
          .ib-grid4  { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
          .ib-grid2  { grid-template-columns: 1fr !important; gap: 10px !important; }
          .ib-grid3  { grid-template-columns: 1fr !important; gap: 10px !important; }

          /* Header – skryj FX kurzy, nech jen menu a měnu */
          .ib-hdr-fx       { display: none !important; }
          .ib-hdr-divider  { display: none !important; }
          .ib-nav          { display: none !important; }

          /* Spodní tab bar */
          .ib-tab-bar {
            display: flex !important;
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
            background: rgba(15,15,19,0.98);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
          }

          /* Typografie */
          .ib-hero-value { font-size: 32px !important; letter-spacing: -0.02em !important; }

          /* StatCard kompaktnější */
          .ib-statcard { padding: 12px 14px !important; border-radius: 12px !important; }
          .ib-statcard-val { font-size: 17px !important; }
          .ib-statcard-lbl { font-size: 10px !important; }

          /* Tabulky – horizontální scroll */
          .ib-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; }
          .ib-table-wrap table { min-width: 540px; }

          /* Karty */
          .ib-card { border-radius: 12px !important; padding: 14px 14px !important; }

          /* Penzijko KPI – 2 sloupce místo 5 */
          .ib-pension-kpi { grid-template-columns: 1fr 1fr !important; }

          /* Hero gap */
          .ib-hero-row { gap: 20px !important; }
          .ib-hero-sub { font-size: 11px !important; }

          /* Projekce – 1 sloupec */
          .ib-proj-grid { grid-template-columns: 1fr !important; }

          /* Grafy – nižší výška */
          .ib-chart-tall { height: 180px !important; }
        }

        @media (min-width: 481px) {
          .ib-tab-bar { display: none !important; }
          .ib-nav     { display: flex !important; }
          .ib-main    { padding: 28px 32px; }
        }
      `}</style>

      <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: "'DM Sans', system-ui, sans-serif", overflowX: "hidden", width: "100%" }}>
        {/* HEADER */}
        <header className="ib-header" style={{ height: 56, padding: "0 32px", borderBottom: "1px solid " + T.border, display: "flex", alignItems: "center", position: "sticky", top: 0, background: "rgba(15,15,19,0.92)", backdropFilter: "blur(16px)", zIndex: 100 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginRight: 40 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: "linear-gradient(135deg," + T.green + "," + T.blue + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, color: "#000" }}>i</div>
            <div>
              <span style={{ fontSize: 17, fontWeight: 700, color: T.text, letterSpacing: "-0.01em" }}>InvestBook</span>
              <span style={{ fontSize: 10, color: T.muted, marginLeft: 6, fontFamily: "'DM Mono',monospace" }}>v2.4</span>
            </div>
          </div>
          <nav className="ib-nav" style={{ gap: 2 }}>
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                style={{ padding: "6px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, transition: "all 0.12s",
                  background: activeTab === tab.id ? "rgba(255,255,255,0.08)" : "transparent",
                  color: activeTab === tab.id ? T.text : T.muted }}>
                {tab.label}
              </button>
            ))}
          </nav>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
            <div className="ib-hdr-fx" style={{ alignItems: "center", gap: 6 }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: T.green, animation: "pulse 2.5s infinite", boxShadow: "0 0 6px " + T.green }} />
              <span style={{ fontSize: 12, color: T.muted, fontFamily: "'DM Mono',monospace" }}>EUR 24,23 · USD 20,57</span>
            </div>
            <div className="ib-hdr-fx" style={{ height: 20, width: 1, background: T.border }} />
            <div className="ib-hdr-currency" style={{ gap: 2, background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: 3 }}>
              {["CZK","EUR","USD"].map(cur => (
                <button key={cur} onClick={() => setDispCurrency(cur)}
                  style={{ padding: "3px 10px", borderRadius: 6, border: "none", cursor: "pointer",
                    fontFamily: "'DM Mono',monospace", fontSize: 12, fontWeight: 700, transition: "all 0.12s",
                    background: dispCurrency === cur ? T.blue : "transparent",
                    color: dispCurrency === cur ? "#fff" : T.muted }}>
                  {cur}
                </button>
              ))}
            </div>
            <div className="ib-hdr-divider" style={{ height: 20, width: 1, background: T.border }} />
            <span style={{ fontSize: 14, fontWeight: 700, color: T.green, fontFamily: "'DM Mono',monospace" }}>{fmt(totalValue)}</span>
          </div>
        </header>

        {/* Mobile bottom tab bar */}
        <div className="ib-tab-bar">
          {TABS.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "4px 0",
                color: activeTab === tab.id ? T.green : T.muted }}>
              <span style={{ fontSize: 20 }}>
                {tab.id === "portfolio" ? "📊" : tab.id === "analyza" ? "🔍" : tab.id === "penzijko" ? "🏦" : "📋"}
              </span>
              <span style={{ fontSize: 11, fontWeight: 600 }}>{tab.label}</span>
            </button>
          ))}
        </div>

        <main className="ib-main" style={{ maxWidth: 1360, margin: "0 auto", padding: "28px 32px", boxSizing: "border-box", width: "100%" }}>
          {gsMsg !== "" && (
            <div style={{ marginBottom: 14, padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 600,
              background: gsStatus === "error" ? "rgba(239,68,68,0.1)" : "rgba(16,185,129,0.1)",
              border: "1px solid " + (gsStatus === "error" ? "rgba(239,68,68,0.25)" : "rgba(16,185,129,0.25)"),
              color: gsStatus === "error" ? "#f87171" : "#6ee7b7" }}>
              {gsMsg}
            </div>
          )}
          {activeTab === "portfolio" && tabPrehled()}
          {activeTab === "positions" && tabPozice()}
          {activeTab === "analyza"   && tabAnalyza()}
          {activeTab === "penzijko"  && tabPenzijko()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InvestBook));

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.log('SW error:', e));
      });
    }
  </script>
</body>
</html>
