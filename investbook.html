const SCOPES    = "https://www.googleapis.com/auth/spreadsheets";
const DISCOVERY = "https://sheets.googleapis.com/$discovery/rest?version=v4";
let tokenClient = null, gapiInited = false, gisInited = false, _token = null;

function initGoogleAPI(onReady) {
  function maybeReady() { if (gapiInited && gisInited) onReady(); }
  const poll = setInterval(() => {
    if (typeof gapi !== "undefined" && typeof google !== "undefined") {
      clearInterval(poll);
      gapi.load("client", async () => {
        await gapi.client.init({ discoveryDocs: [DISCOVERY] });
        gapiInited = true; maybeReady();
      });
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: window.INVESTBOOK_CONFIG.CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => {
          if (resp.error) return;
          _token = resp.access_token;
          gapi.client.setToken({ access_token: _token });
          window._authCb && window._authCb();
        },
      });
      gisInited = true; maybeReady();
    }
  }, 150);
}

function withAuth(cb) {
  window._authCb = cb;
  if (_token) { cb(); return; }
  tokenClient.requestAccessToken({ prompt: "" });
}

async function sheetsGet(range) {
  const r = await gapi.client.sheets.spreadsheets.values.get({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID, range });
  return r.result.values || [];
}
async function sheetsSet(range, values) {
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
    range, valueInputOption: "RAW", resource: { values } });
}
async function ensureSheets() {
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID });
  const have = meta.result.sheets.map(s => s.properties.title);
  const need = ["manual_positions","imported_positions","settings"].filter(n => !have.includes(n));
  if (!need.length) return;
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
    resource: { requests: need.map(title => ({ addSheet: { properties: { title } } })) }
  });
}

async function clearSheet(name) {
  await gapi.client.sheets.spreadsheets.values.clear({
    spreadsheetId: window.INVESTBOOK_CONFIG.SPREADSHEET_ID,
    range: name + "!A1:Z10000",
  });
}
async function saveToSheets(manual, imported, settings) {
  await ensureSheets();
  await Promise.all([
    clearSheet("manual_positions"),
    clearSheet("imported_positions"),
    clearSheet("settings"),
  ]);
  await sheetsSet("manual_positions!A1",   [PHDR, ...manual.map(posToRow)]);
  await sheetsSet("imported_positions!A1", [PHDR_IMP, ...imported.map(posToRowImp)]);
  await sheetsSet("settings!A1", [["key","value"], ...Object.entries(settings).map(([k,v])=>[k,v])]);
}

async function loadFromSheets() {
  const [m, i, s, p] = await Promise.all([
    sheetsGet("manual_positions!A2:L1000"),
    sheetsGet("imported_positions!A2:L1000"),
    sheetsGet("settings!A2:B100"),
    sheetsGet("prices!A2:B1000"),
  ]);
  // Build price map: ticker -> price_usd
  const prices = {};
  for (const row of (p||[])) {
    if (row[0] && row[1]) prices[row[0].trim()] = parseFloat(row[1]) || 0;
  }
  return {
    manual:   m.filter(r=>r.length>=6).map(rowToPos),
    imported: i.filter(r=>r.length>=3).map(rowToImp),
    settings: Object.fromEntries((s||[]).map(r=>[r[0],r[1]])),
    prices,
  };
}

// ─── CSV PARSER ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  // Parse header
  const parseRow = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  };
  const headers = parseRow(lines[0]);
  return lines.slice(1).map(l => {
    const vals = parseRow(l);
    return Object.fromEntries(headers.map((h, i) => [h, vals[i] || '']));
  });
}

function aggregateCSV(rows) {
  const positions = {};
  for (const r of rows) {
    const way = r['Way'];
    if (!['BUY','SELL'].includes(way)) continue;
    const baseType = r['Base type'];
    if (baseType === 'FIAT') continue;
    const baseCur = (r['Base currency (name)'] || '').trim();
    const ticker  = baseCur.split(' ')[0].trim();
    const name    = baseCur;
    const quoteCur = (r['Quote currency'] || 'USD').trim();
    const baseAmt  = parseFloat(r['Base amount'])  || 0;
    const quoteAmt = parseFloat(r['Quote amount']) || 0;
    let broker = (r['Broker'] || '').trim();
    if (!broker || broker === 'DGA') broker = 'Crypto';
    const year = parseInt((r['Date'] || '2024').substring(0, 4));
    const key  = broker + '||' + ticker;
    if (!positions[key]) {
      const cat = baseType === 'CRYPTO' ? 'Crypto' : (baseType === 'FUND' ? 'ETF' : 'Akcie');
      positions[key] = { ticker, name, broker, category: cat, currency: quoteCur, shares: 0, invested: 0, start: year };
    }
    const p = positions[key];
    if (year < p.start) p.start = year;
    if (way === 'BUY')  { p.shares += baseAmt; p.invested += quoteAmt; }
    else                { p.shares -= baseAmt; p.invested -= quoteAmt; }
  }
  return Object.values(positions).filter(p => p.shares > 0.00001);
}

// ─── EDIT CELL ────────────────────────────────────────────────────────────────
function EditCell({ value, onSave, align, suffix, color, type, isSelect, options, locked }) {
  align = align || "right"; suffix = suffix || ""; type = type || "number"; isSelect = isSelect || false; options = options || [];
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(String(value));
  const commit = () => { setEditing(false); onSave(draft); };
  const inputStyle = { background: "#0f0f13", border: "1px solid " + T.blue, borderRadius: 6, color: T.text, fontFamily: "'DM Mono','Fira Mono',monospace", fontSize: 13, padding: "4px 8px", width: "100%", outline: "none", textAlign: align };

  if (locked) {
    return (
      <td style={{ padding: "10px 12px", textAlign: align, fontFamily: "'DM Mono',monospace", fontSize: 13, color: color || T.muted }}>
        {value}{suffix}
      </td>
    );
  }

  if (editing) {
    if (isSelect) return (
      <td style={{ padding: "2px 6px" }}>
        <select autoFocus value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit} style={{ ...inputStyle, textAlign: "left" }}>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      </td>
    );
    return (
      <td style={{ padding: "2px 6px" }}>
        <input autoFocus type="text" value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit}
          onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setDraft(String(value)); setEditing(false); } }}
          style={inputStyle} />
      </td>
    );
  }
  return (
    <td onClick={() => { setDraft(String(value)); setEditing(true); }} title="Klikni pro editaci"
      style={{ padding: "10px 12px", textAlign: align, cursor: "text", fontFamily: "'DM Mono',monospace", fontSize: type === "text" ? 13 : 13, color: color || T.text }}>
      <span style={{ borderBottom: "1px dashed rgba(255,255,255,0.1)", paddingBottom: 1 }}>{value}{suffix}</span>
    </td>
  );
}

function Badge({ label, color }) {
  return <span style={{ fontSize: 11, fontWeight: 600, color, background: color + "18", padding: "2px 8px", borderRadius: 20 }}>{label}</span>;
}

function SectionTitle({ title, sub }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 2 }}>{title}</div>
      {sub && <div style={{ fontSize: 13, color: T.muted }}>{sub}</div>}
    </div>
  );
}

function StatCard({ label, value, sub, color, accent }) {
  return (
    <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: "18px 20px", position: "relative", overflow: "hidden" }}>

      <div style={{ fontSize: 11, color: T.muted, letterSpacing: "0.08em", fontWeight: 500, marginBottom: 10, textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: 23, fontWeight: 700, color: color || T.text, letterSpacing: "-0.02em", lineHeight: 1.2 }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: T.muted, marginTop: 5 }}>{sub}</div>}
    </div>
  );
}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
          {[
            { title: "Podle brokera",    data: brokerData, colorFn: (_, i) => BROKER_COLORS[i % BROKER_COLORS.length] },
            { title: "Podle kategorie",  data: catData,    colorFn: (d)    => CAT_COLOR[d.name] || T.muted },
          ].map(cfg => (
            <div key={cfg.title} style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 16, padding: 22 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: T.text, marginBottom: 18 }}>{cfg.title}</div>
              <ResponsiveContainer width="100%" height={140}>
                <PieChart>
                  <Pie data={cfg.data} dataKey="value" cx="50%" cy="50%" innerRadius={40} outerRadius={62} paddingAngle={2}>
                    {cfg.data.map((d, i) => <Cell key={i} fill={cfg.colorFn(d, i)} />)}
                  </Pie>
                  <Tooltip content={<DTooltip />} />
                </PieChart>
              </ResponsiveContainer>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 12 }}>
                {cfg.data.map((d, i) => {
                  const c = cfg.colorFn(d, i);
                  return (
                    <div key={d.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <div style={{ width: 8, height: 8, borderRadius: 2, background: c, flexShrink: 0 }} />
                        <span style={{ fontSize: 14, color: T.muted }}>{d.name}</span>
                      </div>
                      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <span style={{ fontSize: 13, color: T.subtle }}>{fmtCZK(d.value)}</span>
                        <span style={{ fontSize: 14, fontWeight: 600, color: T.text, fontFamily: "'DM Mono',monospace", minWidth: 38, textAlign: "right" }}>{((d.value/totalValue)*100).toFixed(1)}%</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        {/* Annual return bar */}
        <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 16, padding: 22, marginBottom: 20 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: T.text, marginBottom: 4 }}>Roční výnos podle pozice</div>
          <div style={{ fontSize: 13, color: T.muted, marginBottom: 18 }}>p.a. za dobu držení</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={returnData} margin={{ left: -4 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
              <XAxis dataKey="name" tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.muted }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.muted }} axisLine={false} tickLine={false} tickFormatter={v => v + "%"} />
              <Tooltip {...ttStyle} formatter={v => [v.toFixed(2) + " %", "Roční výnos"]} />
              <Bar dataKey="ret" radius={[4,4,0,0]}>
                {returnData.map((d, i) => <Cell key={i} fill={d.ret >= 0 ? T.green : T.red} fillOpacity={0.9} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Projections */}
        {(() => {
          const base    = totalValue;
          const rateAvg = STATIC.avgAnnReturnNoCrypto / 100;
          const rate10  = 0.10;
          const annual  = monthlyContrib * 12;
          const years   = [2026,2027,2028,2029,2030,2031,2032];
          const fv = (rate, i) => {
            const lump    = base * Math.pow(1 + rate, i);
            const contrib = i === 0 ? 0 : annual * ((Math.pow(1 + rate, i) - 1) / rate);
            return Math.round(lump + contrib);
          };
          const projData = years.map((yr, i) => ({
            rok: String(yr),
            avg:     fv(rateAvg, i),
            r10:     fv(rate10,  i),
            avgBase: Math.round(base * Math.pow(1 + rateAvg, i)),
            r10Base: Math.round(base * Math.pow(1 + rate10,  i)),
          }));
          const fmt = v => v >= 1000000 ? (v/1000000).toFixed(2)+"M" : (v/1000).toFixed(0)+"k";
          const commitContrib = () => { const n = parseFlt(contribDraft); if (!isNaN(n) && n >= 0) setMonthlyContrib(n); setEditingContrib(false); };

          return (
            <div>
              {/* Contrib row */}
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14, padding: "14px 20px", background: T.card, border: "1px solid " + T.border, borderRadius: 12 }}>
                <div style={{ fontSize: 13, color: T.muted, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase" }}>Měsíční příkop vlastního kapitálu</div>
                <div style={{ flex: 1 }} />
                {editingContrib ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input autoFocus type="text" value={contribDraft}
                      onChange={e => setContribDraft(e.target.value)}
                      onBlur={commitContrib}
                      onKeyDown={e => { if (e.key === "Enter") commitContrib(); if (e.key === "Escape") setEditingContrib(false); }}
                      style={{ background: T.bg, border: "1px solid " + T.blue, borderRadius: 8, color: T.text, fontFamily: "'DM Mono',monospace", fontSize: 16, padding: "6px 12px", width: 130, outline: "none", textAlign: "right" }} />
                    <span style={{ fontSize: 14, color: T.blue, fontWeight: 600 }}>Kč / měs</span>
                  </div>
                ) : (
                  <div onClick={() => { setContribDraft(String(monthlyContrib)); setEditingContrib(true); }}
                    style={{ display: "flex", alignItems: "center", gap: 10, cursor: "text", padding: "7px 16px", background: "rgba(59,130,246,0.08)", border: "1px solid rgba(59,130,246,0.2)", borderRadius: 8, transition: "all 0.12s" }}>
                    <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 18, color: T.blue, fontWeight: 700 }}>{fmtCZK(monthlyContrib)}</span>
                    <span style={{ fontSize: 13, color: T.muted }}>/ měs</span>
                    <span style={{ fontSize: 13, color: T.subtle, marginLeft: 2 }}>✎</span>
                  </div>
                )}
                <div style={{ fontSize: 13, color: T.muted }}>= {fmtCZK(monthlyContrib * 12)} ročně</div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                {[
                  { label: "Predikce · " + STATIC.avgAnnReturnNoCrypto + " % p.a.", sub: "průměrný výnos bez crypto", key: "avg", baseKey: "avgBase", color: T.green, grad: "gPA" },
                  { label: "Predikce · 10 % p.a.", sub: "konzervativní scénář S&P 500", key: "r10", baseKey: "r10Base", color: T.blue, grad: "gP10" },
                ].map(cfg => {
                  const finalVal    = projData[projData.length - 1][cfg.key];
                  const finalBase   = projData[projData.length - 1][cfg.baseKey];
                  const contribGain = finalVal - finalBase;
                  return (
                    <div key={cfg.key} style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 16, padding: 22 }}>
                      <div style={{ fontSize: 15, fontWeight: 600, color: T.text, marginBottom: 2 }}>{cfg.label}</div>
                      <div style={{ fontSize: 13, color: T.muted, marginBottom: 10 }}>{cfg.sub}</div>
                      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: monthlyContrib > 0 ? 2 : 16 }}>
                        <span style={{ fontSize: 31, fontWeight: 800, color: cfg.color, letterSpacing: "-0.02em" }}>{fmtCZK(finalVal)}</span>
                        <span style={{ fontSize: 13, color: T.muted }}>v roce 2032</span>
                      </div>
                      {monthlyContrib > 0 && (
                        <div style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>
                          z toho příkopem <span style={{ color: cfg.color, fontWeight: 600 }}>{fmtCZK(contribGain)}</span>
                        </div>
                      )}
                      {monthlyContrib === 0 && <div style={{ marginBottom: 16 }} />}
                      <ResponsiveContainer width="100%" height={180}>
                        <AreaChart data={projData} margin={{ left: 4, right: 4, top: 4, bottom: 0 }}>
                          <defs>
                            <linearGradient id={cfg.grad} x1="0" y1="0" x2="0" y2="1">
                              <stop offset="0%" stopColor={cfg.color} stopOpacity={0.2} />
                              <stop offset="100%" stopColor={cfg.color} stopOpacity={0} />
                            </linearGradient>
                            <linearGradient id={cfg.grad+"b"} x1="0" y1="0" x2="0" y2="1">
                              <stop offset="0%" stopColor={cfg.color} stopOpacity={0.06} />
                              <stop offset="100%" stopColor={cfg.color} stopOpacity={0} />
                            </linearGradient>
                          </defs>
                          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
                          <XAxis dataKey="rok" tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.muted }} axisLine={false} tickLine={false} />
                          <YAxis tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.muted }} axisLine={false} tickLine={false} width={52}
                            domain={[
                              () => Math.floor(base * 0.95 / 100000) * 100000,
                              dataMax => Math.ceil(dataMax * 1.05 / 100000) * 100000,
                            ]}
                            tickFormatter={v => v >= 1000000 ? (v/1000000).toFixed(1)+"M" : (v/1000).toFixed(0)+"k"} />
                          <Tooltip {...ttStyle} formatter={(v, name) => [fmtCZK(v), name === cfg.key ? "S příkopem" : "Bez příkopu"]} />
                          <Area type="monotone" dataKey={cfg.baseKey} stroke={cfg.color} strokeWidth={1} strokeDasharray="4 3" fill={"url(#"+cfg.grad+"b)"} dot={false} />
                          <Area type="monotone" dataKey={cfg.key} stroke={cfg.color} strokeWidth={2.5} fill={"url(#"+cfg.grad+")"} dot={{ r: 3, fill: cfg.color, strokeWidth: 0 }} activeDot={{ r: 5, fill: cfg.color, strokeWidth: 0 }} />
                        </AreaChart>
                      </ResponsiveContainer>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                        {projData.filter((_, i) => i > 0).map(pt => (
                          <div key={pt.rok} style={{ textAlign: "center" }}>
                            <div style={{ fontSize: 12, color: T.muted, marginBottom: 3 }}>{pt.rok}</div>
                            <div style={{ fontSize: 12, color: cfg.color, fontFamily: "'DM Mono',monospace", fontWeight: 600 }}>{fmt(pt[cfg.key])}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}
      </div>
    );
  };

  // ── POZICE ───────────────────────────────────────────────────────────────────
  const tabPozice = () => {
    const manualTotal   = manualRows.reduce((s, p) => s + toCZK(p), 0);
    const manualInvested = manualRows.reduce((s, p) => s + investedCZK(p), 0);
    const importedTotal    = importedRows.reduce((s,p) => {
      const fx = p.fx||(p.currency==="EUR"?DEGIRO_FX:p.currency==="GBP"?GBP_FX:ETORO_FX);
      return s + (p.priceCZK && p.shares ? Math.round(p.priceCZK*p.shares) : Math.round((p.invested||0)*fx));
    }, 0);
    const importedInvested = importedRows.reduce((s,p) => {
      const fx = p.fx||(p.currency==="EUR"?DEGIRO_FX:p.currency==="GBP"?GBP_FX:ETORO_FX);
      return s + Math.round((p.invested||0)*fx);
    }, 0);

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 800, color: T.text, letterSpacing: "-0.02em" }}>Pozice portfolia</h1>
            <div style={{ fontSize: 13, color: T.muted, marginTop: 4 }}>{allRows.length} pozic · {fmtCZK(totalValue)}</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ fontSize: 12, color: T.muted, padding: "6px 12px", background: "rgba(255,255,255,0.04)", borderRadius: 8 }}>✎ klikni pro editaci</span>
            <button onClick={addManual} style={{ background: T.green, border: "none", borderRadius: 8, color: "#000", cursor: "pointer", padding: "8px 16px", fontSize: 13, fontWeight: 700 }}>+ Přidat</button>

                      </div>
        </div>

        {/* Price fetch status banner */}
        
        {/* MANUAL POSITIONS (ČSOB + Portu) */}
        <div style={{ fontSize: 11, color: T.muted, letterSpacing: "0.1em", fontWeight: 600, marginBottom: 8, textTransform: "uppercase" }}>
          Ruční pozice — ČSOB
        </div>
        <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, overflow: "hidden", marginBottom: 20 }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "1px solid " + T.border }}>
                {["Název","Broker","Kategorie","Investováno (CZK)","Hodnota (CZK)","Výnos","Výnos %","Podíl %","Start","Roční %",""].map((h, i) => (
                  <th key={i} style={{ padding: "9px 12px", textAlign: i <= 2 ? "left" : i === 10 ? "center" : "right", fontSize: 11, color: T.muted, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {manualRows.map(pos => {
                const gain    = toCZK(pos) - investedCZK(pos);
                const gainPct = investedCZK(pos) > 0 ? (gain / investedCZK(pos)) * 100 : 0;
                const share   = totalValue > 0 ? (toCZK(pos) / totalValue) * 100 : 0;
                const gc = gain >= 0 ? T.green : T.red;
                return (
                  <tr key={pos.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)" }}
                    onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.02)"}
                    onMouseLeave={e => e.currentTarget.style.background = ""}>
                    <EditCell value={pos.name}     type="text" align="left" color={CAT_COLOR[pos.category] || T.text} onSave={v => updateManual(pos.id,"name",v)} />
                    <EditCell value={pos.broker}   type="text" align="left" color={T.muted}                           onSave={v => updateManual(pos.id,"broker",v)} />
                    <EditCell value={pos.category} isSelect options={CATEGORIES} align="left" color={CAT_COLOR[pos.category]||T.muted} onSave={v=>updateImported(pos.id,"category",v)}/>
                    <EditCell value={pos.invested} color={T.muted} onSave={v => updateManual(pos.id,"invested",v)} />
                    <EditCell value={pos.value}    color={T.text}  onSave={v => updateManual(pos.id,"value",v)} />
                    <td style={nc(gc)}>{gain >= 0 ? "+" : ""}{fmtCZK(gain)}</td>
                    <td style={{ ...nc(gc), fontWeight: 700 }}>{gainPct >= 0 ? "+" : ""}{gainPct.toFixed(2)}%</td>
                    <td style={nc(T.muted)}>{share.toFixed(2)}%</td>
                    <EditCell value={pos.start}    color={T.muted} onSave={v => updateManual(pos.id,"start",v)} />
                    <EditCell value={pos.annReturn != null ? pos.annReturn : ""} color={pos.annReturn != null ? (pos.annReturn >= 0 ? T.green : T.red) : T.subtle} suffix={pos.annReturn != null ? "%" : ""} onSave={v => updateManual(pos.id,"annReturn",v)} />
                    <td style={{ padding: "0 8px", textAlign: "center" }}>
                      <button onClick={() => deleteManual(pos.id)} style={{ background: "none", border: "none", color: T.subtle, cursor: "pointer", fontSize: 18, padding: "4px 6px", borderRadius: 4 }}
                        onMouseEnter={e => e.currentTarget.style.color = T.red}
                        onMouseLeave={e => e.currentTarget.style.color = T.subtle}>×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ borderTop: "1px solid rgba(34,197,94,0.15)", background: "rgba(34,197,94,0.03)" }}>
                <td colSpan={3} style={{ padding: "10px 12px", fontSize: 12, color: T.green, fontWeight: 700 }}>SOUČET</td>
                <td style={nc(T.muted)}>{fmtCZK(manualInvested)}</td>
                <td style={{ ...nc(T.text), fontSize: 15, fontWeight: 800 }}>{fmtCZK(manualTotal)}</td>
                <td style={nc(T.green)}>{fmtCZK(manualTotal - manualInvested)}</td>
                <td style={{ ...nc(T.green), fontWeight: 700 }}>{manualInvested > 0 ? "+" + (((manualTotal-manualInvested)/manualInvested)*100).toFixed(2)+"%" : "—"}</td>
                <td colSpan={4} />
              </tr>
            </tfoot>
          </table>
        </div>

        {/* IMPORTED POSITIONS (DEGIRO + eToro + Crypto) */}
        <div style={{ fontSize: 11, color: T.muted, letterSpacing: "0.1em", fontWeight: 600, marginBottom: 8, textTransform: "uppercase" }}>
          Importované pozice — DEGIRO · eToro · Crypto
        </div>

        <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, overflow: "hidden", marginBottom: 20 }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "1px solid " + T.border }}>
                {["Ticker","Broker","Kategorie","Kusy","Investováno","Invest. CZK","Hodnota CZK","Výnos CZK","Výnos %","Podíl","Roční %","Od"].map((h, i) => (
                  <th key={i} style={{ padding: "9px 12px", textAlign: i <= 2 ? "left" : "right", fontSize: 11, color: T.muted, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {importedRows.map(pos => {
                const rate     = pos.fx || (pos.currency === 'EUR' ? DEGIRO_FX : pos.currency === 'GBP' ? GBP_FX : ETORO_FX);
                const invCZK   = (pos.invested || 0) * rate;
                const hasPrice = pos.priceCZK != null && pos.shares != null;
                const valueCZK = hasPrice ? pos.priceCZK * pos.shares : invCZK;
                const gainCZK  = valueCZK - invCZK;
                const gainPct  = invCZK > 0 ? (gainCZK / invCZK) * 100 : 0;
                const sharePct = totalValue > 0 ? (valueCZK / totalValue) * 100 : 0;
                const years    = Math.max(1, new Date().getFullYear() - (pos.start || 2024));
                const annR     = hasPrice && invCZK > 0 ? (Math.pow(valueCZK / invCZK, 1 / years) - 1) * 100 : null;
                const gc       = gainCZK >= 0 ? T.green : T.red;
                return (
                  <tr key={pos.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)" }}
                    onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.02)"}
                    onMouseLeave={e => e.currentTarget.style.background = ""}>
                    <td style={{ padding: "10px 12px", minWidth: 140 }}>
                      <div style={{ fontWeight: 700, fontSize: 12, color: T.text }}>{pos.ticker}</div>
                      <div style={{ fontSize: 10, color: T.subtle }}>{pos.name.split("(")[0].trim()}</div>
                    </td>
                    <EditCell value={pos.broker} type="text" align="left" color={T.muted} onSave={v=>updateImported(pos.id,"broker",v)}/>
                    <EditCell value={pos.category} isSelect options={CATEGORIES} align="left" color={CAT_COLOR[pos.category]||T.muted} onSave={v=>updateImported(pos.id,"category",v)}/>
                    <td style={nc(T.subtle)}>{pos.shares != null ? pos.shares.toLocaleString("cs-CZ",{maximumFractionDigits:4}) : "—"}</td>
                    <td style={nc(T.muted)}>{(pos.invested||0).toLocaleString("cs-CZ",{maximumFractionDigits:0})} {pos.currency}</td>
                    <td style={nc(T.muted)}>{fmtCZK(invCZK)}</td>
                    <td style={nc(hasPrice ? T.text : T.subtle)}>{hasPrice ? fmtCZK(valueCZK) : <span style={{fontSize:10,color:T.subtle}}>chybí cena</span>}</td>
                    <td style={nc(hasPrice ? gc : T.subtle)}>{hasPrice ? (gainCZK>=0?"+":"")+fmtCZK(gainCZK) : "—"}</td>
                    <td style={{...nc(hasPrice ? gc : T.subtle), fontWeight:700}}>{hasPrice ? (gainPct>=0?"+":"")+gainPct.toFixed(2)+"%" : "—"}</td>
                    <td style={nc(T.subtle)}>{sharePct.toFixed(2)}%</td>
                    <td style={nc(annR !== null ? (annR>=0?T.green:T.red) : T.subtle)}>{annR !== null ? (annR>=0?"+":"")+annR.toFixed(2)+"%" : "—"}</td>
                    <td style={nc(T.subtle)}>{pos.start}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ borderTop: "1px solid rgba(59,130,246,0.2)", background: "rgba(59,130,246,0.03)" }}>
                <td colSpan={3} style={{ padding: "10px 12px", fontSize: 12, color: T.blue, fontWeight: 700 }}>SOUČET</td>
                <td style={nc(T.muted)}>—</td>
                <td style={{ ...nc(T.text), fontSize: 15, fontWeight: 800 }}>{fmtCZK(importedTotal)}</td>
                <td style={nc(T.green)}>{fmtCZK(importedTotal - importedInvested)}</td>
                <td style={{ ...nc(T.green), fontWeight: 700 }}>{importedInvested > 0 ? "+" + (((importedTotal-importedInvested)/importedInvested)*100).toFixed(2)+"%" : "—"}</td>
                <td colSpan={4} />
              </tr>
            </tfoot>
          </table>
        </div>

        {/* Majetek a závazky */}
        {(() => {
          const hodnotaMajetku = totalValue + zustatek;
          const cistyMajetek   = hodnotaMajetku - hypoteka;
          return (
            <div style={{ background:T.card, border:"1px solid "+T.border, borderRadius:16, overflow:"hidden" }}>
              <div style={{ padding:"14px 20px", borderBottom:"1px solid "+T.border, fontSize:12, fontWeight:600, color:T.muted, letterSpacing:"0.08em" }}>MAJETEK A ZÁVAZKY</div>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <tbody>
                  <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                    <td style={{ padding:"13px 20px", fontSize:13, color:T.muted, width:"35%" }}>Hodnota portfolia</td>
                    <td style={{ padding:"13px 20px", fontSize:15, fontWeight:700, color:T.green, fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{fmtCZK(totalValue)}</td>
                    <td style={{ padding:"13px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>investováno {fmtCZK(totalInvested)}</td>
                  </tr>
                  <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                    <td style={{ padding:"13px 20px", fontSize:13, color:T.muted }}>Zůstatek na účtu</td>
                    <td style={{ padding:"4px 12px", textAlign:"right" }}>
                      <input type="text" defaultValue={zustatek} onBlur={e=>{ const n=parseFlt(e.target.value); if(n>=0) setZustatek(n); }}
                        style={{ background:"transparent", border:"1px dashed rgba(255,255,255,0.15)", borderRadius:6, color:T.text, fontFamily:"'DM Mono',monospace", fontSize:15, fontWeight:700, padding:"4px 10px", textAlign:"right", outline:"none", width:200 }} />
                    </td>
                    <td style={{ padding:"13px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>hotovost a spořicí účty</td>
                  </tr>
                  <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                    <td style={{ padding:"13px 20px", fontSize:13, color:T.muted }}>Zůstatek hypotéky</td>
                    <td style={{ padding:"4px 12px", textAlign:"right" }}>
                      <input type="text" defaultValue={hypoteka} onBlur={e=>{ const n=parseFlt(e.target.value); if(n>=0) setHypoteka(n); }}
                        style={{ background:"transparent", border:"1px dashed rgba(255,255,255,0.15)", borderRadius:6, color:T.red, fontFamily:"'DM Mono',monospace", fontSize:15, fontWeight:700, padding:"4px 10px", textAlign:"right", outline:"none", width:200 }} />
                    </td>
                    <td style={{ padding:"13px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>aktuální dluh</td>
                  </tr>
                  <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.04)", background:"rgba(255,255,255,0.015)" }}>
                    <td style={{ padding:"13px 20px", fontSize:13, color:T.muted }}>Hodnota majetku celkem</td>
                    <td style={{ padding:"13px 20px", fontSize:15, fontWeight:700, color:T.text, fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{fmtCZK(hodnotaMajetku)}</td>
                    <td style={{ padding:"13px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>portfolio + hotovost</td>
                  </tr>
                  <tr style={{ background:"rgba(34,197,94,0.04)" }}>
                    <td style={{ padding:"14px 20px", fontSize:14, fontWeight:700, color:T.text }}>Čistý majetek</td>
                    <td style={{ padding:"14px 20px", fontSize:20, fontWeight:800, color:cistyMajetek>=0?T.green:T.red, fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{fmtCZK(cistyMajetek)}</td>
                    <td style={{ padding:"14px 20px", fontSize:12, color:T.muted, textAlign:"right" }}>majetek − hypotéka</td>
                  </tr>
                </tbody>
              </table>
            </div>
          );
        })()}
      </div>
    );
  };

  // ── ANALÝZA ──────────────────────────────────────────────────────────────────
  const tabAnalyza = () => {
    const sorted    = allRows.slice().sort((a,b) => b.valueCZK - a.valueCZK);
    const posCount  = allRows.length;
    const profitable = allRows.filter(p => p.valueCZK > p.investedCZK).length;
    const avgHold   = allRows.reduce((s,p) => s + (NOW_YEAR - p.start), 0) / Math.max(posCount, 1);
    const oldest    = allRows.slice().sort((a,b) => a.start - b.start)[0];
    const newest    = allRows.slice().sort((a,b) => b.start - a.start)[0];

    const geoMap = {};
    allRows.forEach(p => {
      const nm = p.name.toUpperCase();
      let geo = "USA";
      if (p.category === "Crypto") geo = "Crypto";
      else if (nm.indexOf(".DE") > -1 || nm.indexOf("RHM") > -1 || nm.indexOf("CSG") > -1 || nm.indexOf("BA-.L") > -1 || nm.indexOf("DFND") > -1) geo = "Evropa";
      else if (p.category === "Fond" || p.category === "Portfolio") geo = "Fond/Portu";
      geoMap[geo] = (geoMap[geo] || 0) + p.valueCZK;
    });
    const GEO_COLOR = { USA: "#3b82f6", Evropa: "#8b5cf6", Crypto: "#ec4899", "Fond/Portu": "#22c55e" };
    const geoEntries = Object.keys(geoMap).map(k => [k, geoMap[k]]).sort((a,b) => b[1] - a[1]);

    const catMap = {};
    allRows.forEach(p => { catMap[p.category] = (catMap[p.category] || 0) + p.valueCZK; });
    const catEntries = Object.keys(catMap).map(k => [k, catMap[k]]).sort((a,b) => b[1] - a[1]);

    const rate = STATIC.avgAnnReturnNoCrypto / 100;
    const milestones = [3000000, 5000000, 10000000];
    const milColors  = [T.green, T.amber, "#ec4899"];

    const barData = sorted.slice(0,12).map(p => ({
      name: p.name.split("(")[0].trim().slice(0,10),
      Investováno: p.investedCZK,
      Hodnota: p.valueCZK,
      cat: p.category,
    }));

    const C = { background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 20 };

    return (
      <div>
        <div style={{ marginBottom: 28 }}>
          <h1 style={{ fontSize: 27, fontWeight: 800, color: T.text, letterSpacing: "-0.02em" }}>Analýza portfolia</h1>
          <div style={{ fontSize: 14, color: T.muted, marginTop: 4 }}>{posCount} pozic · průměrné držení {avgHold.toFixed(1)} let</div>
        </div>

        {/* Stats cards row */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 16 }}>
          <StatCard label="Ziskové pozice"    value={profitable + " / " + posCount}                                        color={T.green}  accent={T.green} />
          <StatCard label="Průměrné držení"   value={avgHold.toFixed(1) + " let"}                                          color={T.text}   accent={T.blue} />
          <StatCard label="Nejstarší pozice"  value={oldest ? oldest.name.split("(")[0].trim() : "—"} sub={oldest ? String(oldest.start) : ""} color={T.muted}  accent={T.subtle} />
          <StatCard label="Nejnovější pozice" value={newest ? newest.name.split("(")[0].trim() : "—"} sub={newest ? String(newest.start) : ""} color={T.muted}  accent={T.subtle} />
        </div>

        {/* Geo allocation */}
        <div style={{ ...C, marginBottom: 16 }}>
          <SectionTitle title="Geografická alokace" sub="Rozložení portfolia podle trhu" />
          <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", gap: 2, marginBottom: 18 }}>
            {geoEntries.map(e => <div key={e[0]} style={{ flex: e[1]/totalValue, background: GEO_COLOR[e[0]] || T.muted, minWidth: 2 }} />)}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 14 }}>
            {geoEntries.map(e => {
              const pct = (e[1]/totalValue)*100;
              return (
                <div key={e[0]} style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: GEO_COLOR[e[0]] || T.muted, flexShrink: 0, marginTop: 2 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 14, color: T.muted, fontWeight: 500 }}>{e[0]}</span>
                      <span style={{ fontSize: 14, color: T.text, fontWeight: 700, fontFamily: "'DM Mono',monospace" }}>{pct.toFixed(1)}%</span>
                    </div>
                    <div style={{ height: 3, background: "rgba(255,255,255,0.05)", borderRadius: 2, marginTop: 5, marginBottom: 4 }}>
                      <div style={{ width: pct+"%", height: "100%", background: GEO_COLOR[e[0]] || T.muted, borderRadius: 2 }} />
                    </div>
                    <span style={{ fontSize: 12, color: T.subtle }}>{fmtCZK(e[1])}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Category alloc */}
        <div style={{ ...C, marginBottom: 16 }}>
          <SectionTitle title="Alokace podle kategorie" sub="Rozložení hodnoty mezi typy aktiv" />
          <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", gap: 2, marginBottom: 18 }}>
            {catEntries.map(e => <div key={e[0]} style={{ flex: e[1]/totalValue, background: CAT_COLOR[e[0]] || T.muted, minWidth: 2 }} />)}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 14 }}>
            {catEntries.map(e => {
              const pct     = (e[1]/totalValue)*100;
              const catPos  = allRows.filter(p => p.category === e[0]);
              const catGain = catPos.reduce((s,p) => s+(p.valueCZK-p.investedCZK), 0);
              const catInv  = catPos.reduce((s,p) => s+p.investedCZK, 0);
              const gp = catInv > 0 ? (catGain/catInv)*100 : 0;
              return (
                <div key={e[0]} style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: CAT_COLOR[e[0]] || T.muted, flexShrink: 0, marginTop: 2 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 14, color: T.muted, fontWeight: 500 }}>{e[0]}</span>
                      <span style={{ fontSize: 14, color: T.text, fontWeight: 700, fontFamily: "'DM Mono',monospace" }}>{pct.toFixed(1)}%</span>
                    </div>
                    <div style={{ height: 3, background: "rgba(255,255,255,0.05)", borderRadius: 2, marginTop: 5, marginBottom: 4 }}>
                      <div style={{ width: pct+"%", height: "100%", background: CAT_COLOR[e[0]] || T.muted, borderRadius: 2 }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 12, color: T.subtle }}>{fmtCZK(e[1])}</span>
                      <span style={{ fontSize: 12, color: gp >= 0 ? T.green : T.red, fontWeight: 600 }}>{gp >= 0 ? "+" : ""}{gp.toFixed(1)}%</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Milestone tracker */}
        <div style={{ ...C, marginBottom: 16 }}>
          <SectionTitle title="Milestone tracker" sub={"Odhad při " + STATIC.avgAnnReturnNoCrypto + " % p.a. · aktuálně " + fmtCZK(totalValue)} />
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {milestones.map((target, i) => {
              const reached = totalValue >= target;
              const pct = Math.min((totalValue / target) * 100, 100);
              const yrs = reached ? null : Math.log(target / totalValue) / Math.log(1 + rate);
              const c = milColors[i];
              return (
                <div key={target}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 22 }}>{reached ? "✅" : ["🎯","🚀","💎"][i]}</span>
                      <div>
                        <div style={{ fontSize: 16, color: T.text, fontWeight: 700 }}>{(target/1000000).toFixed(0)} M CZK</div>
                        <div style={{ fontSize: 12, color: reached ? T.green : T.muted }}>
                          {reached ? "Dosaženo ✓" : "za ~" + yrs.toFixed(1) + " let · rok " + Math.ceil(NOW_YEAR + yrs)}
                        </div>
                      </div>
                    </div>
                    <span style={{ fontSize: 16, color: c, fontWeight: 800, fontFamily: "'DM Mono',monospace" }}>{pct.toFixed(0)}%</span>
                  </div>
                  <div style={{ height: 6, background: "rgba(255,255,255,0.05)", borderRadius: 3 }}>
                    <div style={{ width: pct+"%", height: "100%", background: c, borderRadius: 3 }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Bar chart */}
        <div style={{ ...C, marginBottom: 16 }}>
          <SectionTitle title="Top 12 — investováno vs. hodnota" sub="Porovnání vložené částky a aktuální hodnoty" />
          <ResponsiveContainer width="100%" height={230}>
            <BarChart data={barData} barCategoryGap="28%">
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
              <XAxis dataKey="name" tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.muted }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontFamily: "'DM Mono',monospace", fontSize: 12, fill: T.muted }} axisLine={false} tickLine={false} tickFormatter={v => (v/1000).toFixed(0)+"k"} width={40} />
              <Tooltip {...ttStyle} formatter={(v, name) => [fmtCZK(v), name]} />
              <Bar dataKey="Investováno" fill="rgba(107,114,128,0.35)" radius={[3,3,0,0]} />
              <Bar dataKey="Hodnota" radius={[3,3,0,0]}>
                {barData.map((d, i) => <Cell key={i} fill={CAT_COLOR[d.cat] || T.green} fillOpacity={0.85} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    );
  };

  const TABS = [
    { id: "portfolio", label: "Přehled" },
    { id: "positions", label: "Pozice" },
    { id: "analyza",   label: "Analýza" },
  ];

  return (
    <div>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f13; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
      `}</style>

      <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: "'DM Sans', system-ui, sans-serif" }}>
        {/* HEADER */}
        <header style={{ height: 56, padding: "0 32px", borderBottom: "1px solid " + T.border, display: "flex", alignItems: "center", position: "sticky", top: 0, background: "rgba(15,15,19,0.92)", backdropFilter: "blur(16px)", zIndex: 100 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginRight: 40 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: "linear-gradient(135deg," + T.green + "," + T.blue + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, color: "#000" }}>i</div>
            <span style={{ fontSize: 17, fontWeight: 700, color: T.text, letterSpacing: "-0.01em" }}>InvestBook</span>
          </div>
          <nav style={{ display: "flex", gap: 2 }}>
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                style={{ padding: "6px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, transition: "all 0.12s",
                  background: activeTab === tab.id ? "rgba(255,255,255,0.08)" : "transparent",
                  color: activeTab === tab.id ? T.text : T.muted }}>
                {tab.label}
              </button>
            ))}
          </nav>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: T.green, animation: "pulse 2.5s infinite", boxShadow: "0 0 6px " + T.green }} />
              <span style={{ fontSize: 12, color: T.muted, fontFamily: "'DM Mono',monospace" }}>EUR 24,23 · USD 20,57</span>
            </div>
            <div style={{ height: 20, width: 1, background: T.border }} />
            <span style={{ fontSize: 14, fontWeight: 700, color: T.green, fontFamily: "'DM Mono',monospace" }}>{fmtCZK(totalValue)}</span>
            <div style={{ height: 20, width: 1, background: T.border }} />
            <input ref={React.useRef(null)} id="csvFileInput" type="file" accept=".csv" style={{ display:"none" }}
              onChange={e => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                  try {
                    const rows = parseCSV(evt.target.result);
                    const agg  = aggregateCSV(rows);
                    if (!agg.length) { setGsMsg("✗ CSV neobsahuje platné transakce"); return; }
                    let id = 500;
                    const newPos = agg.map(p => ({
                      id: id++, name: p.name, broker: p.broker, category: p.category,
                      invested: Math.round(p.invested * 100) / 100,
                      value:    Math.round(p.invested * 100) / 100,
                      currency: p.currency,
                      fx: p.currency === 'EUR' ? DEGIRO_FX : p.currency === 'GBP' ? GBP_FX : ETORO_FX,
                      start: p.start, annReturn: null,
                      shares: Math.round(p.shares * 1000000) / 1000000,
                      ticker: p.ticker,
                    }));
                    setImportedRows(newPos);
                    setGsMsg("✓ CSV načteno — " + newPos.length + " pozic. Ulož do Sheets.");
                    setTimeout(() => setGsMsg(""), 5000);
                  } catch(err) { setGsMsg("✗ Chyba při čtení CSV: " + err.message); }
                };
                reader.readAsText(file, 'utf-8');
                e.target.value = '';
              }} />
            <button onClick={() => document.getElementById('csvFileInput').click()}
              style={{ background:"rgba(59,130,246,0.15)", border:"1px solid rgba(59,130,246,0.3)", borderRadius:8, color:T.blue, cursor:"pointer", padding:"6px 14px", fontSize:13, fontWeight:600 }}>
              ↑ CSV
            </button>
            <button onClick={handleLoad} disabled={gsStatus === "loading"}
              style={{ background: "rgba(99,102,241,0.15)", border: "1px solid rgba(99,102,241,0.3)", borderRadius: 8, color: "#a5b4fc", cursor: gsStatus === "loading" ? "default" : "pointer", padding: "6px 14px", fontSize: 13, fontWeight: 600, opacity: gsStatus === "loading" ? 0.6 : 1 }}>
              {gsStatus === "loading" ? "⟳ Načítám…" : "↺ Refresh"}
            </button>
            <button onClick={handleSave} disabled={gsStatus === "saving" || gsStatus === "loading"}
              style={{ background: "rgba(16,185,129,0.15)", border: "1px solid rgba(16,185,129,0.3)", borderRadius: 8, color: "#6ee7b7", cursor: "pointer", padding: "6px 14px", fontSize: 13, fontWeight: 600, opacity: gsStatus === "saving" ? 0.6 : 1 }}>
              {gsStatus === "saving" ? "⟳ Ukládám…" : gsStatus === "saved" ? "✓ Uloženo" : "↑ Uložit"}
            </button>
          </div>
        </header>

        <main style={{ maxWidth: 1360, margin: "0 auto", padding: "28px 32px" }}>
          {gsMsg !== "" && (
            <div style={{ marginBottom: 14, padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 600,
              background: gsStatus === "error" ? "rgba(239,68,68,0.1)" : "rgba(16,185,129,0.1)",
              border: "1px solid " + (gsStatus === "error" ? "rgba(239,68,68,0.25)" : "rgba(16,185,129,0.25)"),
              color: gsStatus === "error" ? "#f87171" : "#6ee7b7" }}>
              {gsMsg}
            </div>
          )}
          {activeTab === "portfolio" && tabPrehled()}
          {activeTab === "positions" && tabPozice()}
          {activeTab === "analyza"   && tabAnalyza()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InvestBook));

  </script>
</body>
</html>
