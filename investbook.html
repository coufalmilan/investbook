                <div style={{ fontSize: 28, fontWeight: 800, color: PURPLE, fontFamily: "'DM Mono',monospace" }}>{fmt(projYear)}</div>
                <div style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>při průměrném přírůstku {fmt(avgMonthly)}/měs · {monthsToYearEnd} měsíců</div>
              </div>
              <div style={{ ...C, marginBottom: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <span style={{ fontSize: 13, color: T.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Projekce – za</span>
                  {editingProjYears ? (
                    <input autoFocus type="text" value={projYearsDraft}
                      onChange={e => setProjYearsDraft(e.target.value)}
                      onBlur={commitProjYears}
                      onKeyDown={e => { if (e.key === "Enter") commitProjYears(); if (e.key === "Escape") setEditingProjYears(false); }}
                      style={{ background: T.bg, border: "1px solid " + T.amber, borderRadius: 6, color: T.text, fontFamily: "'DM Mono',monospace", fontSize: 15, fontWeight: 700, padding: "2px 8px", width: 48, outline: "none", textAlign: "center" }} />
                  ) : (
                    <span onClick={() => { setProjYearsDraft(String(projYears)); setEditingProjYears(true); }}
                      style={{ padding: "2px 10px", background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 6, cursor: "text", fontFamily: "'DM Mono',monospace", fontSize: 15, color: T.amber, fontWeight: 700 }}>
                      {projYears} ✎
                    </span>
                  )}
                  <span style={{ fontSize: 13, color: T.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>let</span>
                </div>
                <div style={{ fontSize: 28, fontWeight: 800, color: T.amber, fontFamily: "'DM Mono',monospace" }}>{fmt(projN)}</div>
                <div style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>při stejném tempu růstu · rok {NOW_YEAR + projYears}</div>
              </div>
            </div>
          );
        })()}

        {/* Metadata – editovatelná */}
        <div style={{ ...C }}>
          <SectionTitle title="Detaily a příspěvky" sub="Klikni na hodnotu pro editaci" />
          <div className="ib-grid4" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
            {[
              { label: "Můj měs. příspěvek", field: "myContrib", value: acc.myContrib||0, suffix: " Kč/měs" },
              { label: "Přísp. zaměstnavatele", field: "employerContrib", value: acc.employerContrib||0, suffix: " Kč/měs" },
              { label: "Celkem já", field: "myTotal", value: acc.myTotal||0, suffix: " Kč" },
              { label: "Celkem zaměstnavatel", field: "employerTotal", value: acc.employerTotal||0, suffix: " Kč" },
              { label: "Státní příspěvky", field: "stateTotal", value: acc.stateTotal||0, suffix: " Kč" },
              { label: "Zhodnocení", field: "appreciation", value: acc.appreciation||0, suffix: " Kč" },
              { label: "Rok začátku spoření", field: "startYear", value: acc.startYear||2006, suffix: "" },
            ].map(m => (
              <div key={m.field} style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, overflow: "hidden", position: "relative" }}>
                <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: PURPLE, borderRadius: "14px 14px 0 0" }} />
                <div style={{ padding: "14px 14px 4px", fontSize: 11, color: T.muted, letterSpacing: "0.08em", fontWeight: 500, textTransform: "uppercase" }}>{m.label}</div>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <tbody><tr>
                    <EditCell value={m.value} color={PURPLE} suffix={m.suffix} onSave={v => updateMeta(m.field, v)} />
                  </tr></tbody>
                </table>
              </div>
            ))}
          </div>
        </div>

        {/* Přidání záznamu */}
        <div style={{ ...C, border: "1px solid " + PURPLE_BORDER }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <SectionTitle title="Záznamy hodnoty" sub={null} />
            <button onClick={() => {
              setPensionAccounts(prev => prev.map(a => {
                if (a.id !== acc.id) return a;
                const newId = Math.max(0, ...(a.entries||[]).map(e => e.id)) + 1;
                const now = new Date();
                const label = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
                return { ...a, entries: [...(a.entries||[]), { id: newId, label, amount: 0 }] };
              }));
            }}
              style={{ background: T.green, border: "none", borderRadius: 8, color: "#000", cursor: "pointer", padding: "7px 16px", fontSize: 13, fontWeight: 700 }}>
              + Přidat záznam
            </button>
          </div>
          <div style={{ fontSize: 12, color: T.muted, marginBottom: 12 }}>Datum ve formátu RRRR-MM, částka v Kč. Kliknutím na buňku lze editovat.</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {entries.map(entry => (
              <div key={entry.id} style={{ display: "flex", alignItems: "center", gap: 4, background: "rgba(167,139,250,0.06)", border: "1px solid " + PURPLE_BORDER, borderRadius: 8, overflow: "hidden", minWidth: 200 }}>
                <table style={{ borderCollapse: "collapse", flex: 1 }}>
                  <tbody><tr>
                    <EditCell value={entry.label} type="text" align="left" color={T.muted}
                      onSave={v => setPensionAccounts(prev => prev.map(a => a.id!==acc.id?a:{...a,entries:a.entries.map(e=>e.id!==entry.id?e:{...e,label:v})}))} />
                    <EditCell value={entry.amount} color={PURPLE}
                      onSave={v => setPensionAccounts(prev => prev.map(a => a.id!==acc.id?a:{...a,entries:a.entries.map(e=>e.id!==entry.id?e:{...e,amount:parseFlt(v)||0})}))} />
                  </tr></tbody>
                </table>
                <button onClick={() => setPensionAccounts(prev => prev.map(a => a.id!==acc.id?a:{...a,entries:a.entries.filter(e=>e.id!==entry.id)}))}
                  style={{ background: "none", border: "none", color: T.subtle, cursor: "pointer", fontSize: 16, padding: "4px 8px", flexShrink: 0 }}
                  onMouseEnter={e => e.currentTarget.style.color = T.red}
                  onMouseLeave={e => e.currentTarget.style.color = T.subtle}>×</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  // ── TAB AI ───────────────────────────────────────────────────────────────────
  const tabAI = () => {
    const C = { background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: "20px 22px" };
    const MONO = "'DM Mono','Fira Mono',monospace";

    // Portfolio kontext pro AI – vše co Gemini potřebuje vědět
    const totalVal  = allRows.reduce((s, p) => s + p.valueCZK, 0);
    const totalInv  = allRows.reduce((s, p) => s + p.investedCZK, 0);
    const totalGain = totalVal - totalInv;
    const gainPct   = totalInv > 0 ? (totalGain / totalInv * 100).toFixed(1) : "0";
    const portfolioCtx = `Moje portfolio k dnešnímu dni (hodnoty v CZK):
Celková hodnota: ${fmtCZK(totalVal)}, Investováno: ${fmtCZK(totalInv)}, Zisk/ztráta: ${fmtCZK(totalGain)} (${gainPct}%)

Pozice (seřazeno dle hodnoty):
${allRows.slice().sort((a,b)=>b.valueCZK-a.valueCZK).map(p => {
  const g = p.gainPctOrig != null ? `${p.gainPctOrig.toFixed(1)}%` : "neznámý výnos";
  return `- ${p.name} [${p.category}, ${p.broker}]: hodnota ${fmtCZK(p.valueCZK)}, investováno ${fmtCZK(p.investedCZK)}, výnos ${g}, od roku ${p.start}`;
}).join("\n")}`;

    const sysPrompt = `Jsi zkušený investiční poradce. Odpovídej vždy v češtině, konkrétně a přímočaře. Používej emoji pro přehlednost. Formátuj s **tučnými nadpisy** a odrážkami.\n\n${portfolioCtx}`;

    // Odeslat zprávu v chatu
    const sendChat = async () => {
      const q = aiInput.trim();
      if (!q || aiLoading || (!geminiKey && !workerUrl)) return;
      setAiInput("");
      const newMsgs = [...aiMessages, { role: "user", content: q }];
      setAiMessages(newMsgs);
      setAiLoading(true);
      setAiMessages(prev => [...prev, { role: "assistant", content: "", typing: true }]);
      try {
        const chatMsgs = newMsgs.filter(m => m.role !== "system").map(m => ({ role: m.role, content: m.content }));
        const full = await callGemini(geminiKey, sysPrompt, chatMsgs, geminiModel, workerUrl);
        await typeInto(full, txt => {
          setAiMessages(prev => { const n = [...prev]; n[n.length-1] = { role: "assistant", content: txt, typing: true }; return n; });
        });
        setAiMessages(prev => { const n = [...prev]; n[n.length-1] = { role: "assistant", content: full, typing: false }; return n; });
      } catch(e) {
        setAiMessages(prev => { const n = [...prev]; n[n.length-1] = { role: "assistant", content: `❌ Chyba: ${e.message}`, typing: false }; return n; });
      } finally { setAiLoading(false); }
    };

    // Analyzovat celé portfolio
    const analyzePortfolio = async () => {
      if (!geminiKey && !workerUrl) return;
      setAiAnalysisLoading(true);
      setAiAnalysis("");
      const userMsg = `Analyzuj mé portfolio:\n${portfolioCtx}\n\nProsím uveď:\n1. **Celkové hodnocení** – zdraví portfolia, diverzifikace\n2. **Nejsilnější pozice** (top 3 s zdůvodněním)\n3. **Nejslabší / riziková pozice** (top 3 s doporučením)\n4. **Konkrétní akce** – co přikoupit, co prodat, co držet\n5. **Strategie** na příštích 12 měsíců`;
      try {
        const txt = await callGemini(geminiKey, "Jsi zkušený portfolio manažer. Odpovídej v češtině, strukturovaně.", [{ role: "user", content: userMsg }], geminiModel, workerUrl);
        setAiAnalysis(txt);
      } catch(e) {
        setAiAnalysis(`❌ Chyba: ${e.message}`);
      } finally { setAiAnalysisLoading(false); }
    };

    // Zjisti dostupné modely pro daný klíč přes ListModels API
    const discoverModels = async (key) => {
      if (!key.trim()) return;
      setGeminiTesting(true); setGeminiTestResult(null);
      try {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key.trim()}&pageSize=50`);
        if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || "Chyba API"); }
        const d = await r.json();
        const models = (d.models || [])
          .filter(m => m.supportedGenerationMethods?.includes("generateContent"))
          .map(m => m.name.replace("models/", ""))
          .sort();
        if (models.length) {
          setDiscoveredModels(models);
          // Preferuj flash modely (rychlé a levné), pak cokoli jiného
          const preferred = models.find(m => m.includes("flash")) || models[0];
          setGeminiModel(preferred);
          setGeminiTestResult({ ok: true, msg: `✅ Nalezeno ${models.length} modelů. Vybrán: ${preferred}` });
        } else {
          setGeminiTestResult({ ok: false, msg: "❌ Klíč nemá žádné modely s generateContent." });
        }
      } catch(e) { setGeminiTestResult({ ok: false, msg: `❌ ${e.message}` }); }
      finally { setGeminiTesting(false); }
    };

    // Test API klíče (používá aktuálně vybraný model)
    const testKey = async (key) => {
      if (!key.trim()) return;
      setGeminiTesting(true); setGeminiTestResult(null);
      try {
        const url = `${GEMINI_BASE}/${geminiModel}:generateContent?key=${key.trim()}`;
        const res = await fetch(url, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: "Odpověz jedním slovem: OK" }] }] })
        });
        if (res.ok) setGeminiTestResult({ ok: true, msg: `✅ Klíč funguje s modelem ${geminiModel}!` });
        else { const e = await res.json(); setGeminiTestResult({ ok: false, msg: `❌ ${e.error?.message || "Neplatný klíč"}` }); }
      } catch(e) { setGeminiTestResult({ ok: false, msg: `❌ Síťová chyba: ${e.message}` }); }
      finally { setGeminiTesting(false); }
    };

    const SUGGESTIONS = ["Jak zdravé je moje portfolio?","Které pozice přikoupit?","Kde mám největší riziko?","Jak zdiverzifikovat portfolio?","Výhled trhu na rok 2025?"];

    const inputBase = { background: T.bg, border: "1px solid " + T.border, borderRadius: 8, color: T.text, fontFamily: "'DM Sans',sans-serif", fontSize: 14, padding: "9px 13px", outline: "none", width: "100%" };

    return (
      <div>
        {/* Nadpis + nastavení */}
        <div className="ib-ai-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <div>
            <h1 style={{ fontSize: 27, fontWeight: 800, color: T.text, letterSpacing: "-0.02em" }}>🤖 AI Asistent</h1>
            <div style={{ fontSize: 14, color: T.muted, marginTop: 4 }}>Gemini AI napojené na tvoje portfolio · {allRows.length} pozic</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {geminiKey && (
              <select value={geminiModel} onChange={e => setGeminiModel(e.target.value)}
                style={{ background: T.card, border: "1px solid " + T.border, color: T.text, borderRadius: 8, padding: "6px 10px", fontSize: 13, cursor: "pointer", outline: "none", fontFamily: MONO, maxWidth: 220 }}>
                {discoveredModels.length > 0
                  ? discoveredModels.map(m => <option key={m} value={m}>{m}</option>)
                  : <>
                      <option value="gemini-2.5-flash">gemini-2.5-flash ⚡</option>
                      <option value="gemini-2.5-pro">gemini-2.5-pro 🧠</option>
                      <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite 🪶</option>
                    </>
                }
              </select>
            )}
            <button onClick={() => setShowGeminiSettings(s => !s)}
              style={{ padding: "7px 16px", borderRadius: 8, border: "1px solid " + T.border, background: T.card, color: T.muted, cursor: "pointer", fontSize: 13, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
              ⚙️ {workerUrl ? "Worker ✓" : geminiKey ? "API klíč ✓" : "Nastavit AI"}
            </button>
          </div>
        </div>

        {/* Settings panel */}
        {showGeminiSettings && (
          <div style={{ ...C, marginBottom: 20, borderColor: "rgba(99,102,241,0.4)" }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 16 }}>⚙️ Nastavení Gemini AI</div>

            {/* Worker URL – doporučeno */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.muted, marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                🌐 Cloudflare Worker URL
                <span style={{ fontSize: 11, background: "rgba(99,102,241,0.15)", color: "#a5b4fc", borderRadius: 4, padding: "1px 7px", fontWeight: 700 }}>DOPORUČENO</span>
              </div>
              <input type="url" placeholder="https://investbook-worker.your-name.workers.dev"
                value={workerUrl}
                onChange={e => { setWorkerUrl(e.target.value); setGeminiTestResult(null); }}
                style={{ ...inputBase, fontFamily: MONO }}
              />
              <div style={{ fontSize: 11, color: T.subtle, marginTop: 5, lineHeight: 1.6 }}>
                Worker volá Gemini na straně serveru – API klíč zůstane skrytý. Nahraj soubor <strong style={{ color: T.text }}>investbook-worker.js</strong> na Cloudflare Workers a sem vlož URL.
              </div>
            </div>

            {/* Přímý API klíč – fallback */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.muted, marginBottom: 6 }}>🔑 Gemini API klíč (přímé volání – fallback)</div>
              <div style={{ background: "rgba(34,197,94,0.06)", border: "1px solid rgba(34,197,94,0.2)", borderRadius: 8, padding: "10px 14px", marginBottom: 10, fontSize: 12, color: T.muted, lineHeight: 1.7 }}>
                1. Jdi na <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{ color: T.blue }}>aistudio.google.com/app/apikey</a> → „Create API key"<br/>
                <span style={{ color: T.subtle }}>Gemini Flash: zdarma · 15 req/min · 1M tokenů/den</span>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <input type="password" placeholder="AIza..." value={geminiKey}
                  onChange={e => { setGeminiKey(e.target.value); setGeminiTestResult(null); }}
                  style={{ ...inputBase, flex: 1, fontFamily: MONO }}
                />
                <button onClick={() => discoverModels(geminiKey)} disabled={geminiTesting || !geminiKey.trim()}
                  title="Zjistí dostupné modely pro tvůj API klíč a automaticky vybere nejlepší"
                  style={{ padding: "9px 14px", borderRadius: 8, border: "1px solid rgba(99,102,241,0.5)", background: "rgba(99,102,241,0.1)", color: "#a5b4fc", cursor: "pointer", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" }}>
                  {geminiTesting ? "…" : "🔍 Zjistit modely"}
                </button>
                <button onClick={() => testKey(geminiKey)} disabled={geminiTesting || !geminiKey.trim()}
                  style={{ padding: "9px 16px", borderRadius: 8, border: "1px solid " + T.border, background: T.card, color: T.muted, cursor: "pointer", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" }}>
                  {geminiTesting ? "Testuji…" : "🧪 Test"}
                </button>
              </div>
            </div>

            {geminiTestResult && (
              <div style={{ padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 10,
                background: geminiTestResult.ok ? "rgba(34,197,94,0.08)" : "rgba(239,68,68,0.08)",
                border: "1px solid " + (geminiTestResult.ok ? "rgba(34,197,94,0.25)" : "rgba(239,68,68,0.25)"),
                color: geminiTestResult.ok ? T.green : "#f87171" }}>
                {geminiTestResult.msg}

            <button onClick={() => {
              localStorage.setItem("ib_gemini_key", geminiKey);
              localStorage.setItem("ib_worker_url", workerUrl);
              setShowGeminiSettings(false);
              setGeminiTestResult(null);

              💾 Uložit nastavení
            </button>
          </div>

        {!geminiKey && !workerUrl ? (
          <div style={{ ...C, textAlign: "center", padding: "56px 32px" }}>
            <div style={{ fontSize: 56, marginBottom: 16 }}>🤖</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: T.text, marginBottom: 8 }}>Nastav Gemini AI</div>
            <div style={{ color: T.muted, fontSize: 14, marginBottom: 20 }}>Použij Worker URL (doporučeno) nebo API klíč zdarma z <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{ color: T.blue }}>aistudio.google.com</a></div>
            <button onClick={() => setShowGeminiSettings(true)}
              style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#6366f1,#8b5cf6)", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>
              ⚙️ Nastavit klíč
            </button>
          </div>
        ) : (
          <div className="ib-ai-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>

            {/* Levý sloupec: Analýza portfolia */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ ...C }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>📊 Analýza portfolia</div>
                    <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>Gemini analyzuje všech {allRows.length} pozic</div>
                  </div>
                  <button onClick={analyzePortfolio} disabled={aiAnalysisLoading}
                    style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: aiAnalysisLoading ? "rgba(99,102,241,0.3)" : "linear-gradient(135deg,#6366f1,#8b5cf6)", color: "#fff", cursor: aiAnalysisLoading ? "not-allowed" : "pointer", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap" }}>
                    {aiAnalysisLoading
                      ? <><span style={{ display: "inline-block", animation: "pulse 1s infinite" }}>⏳</span> Analyzuji…</>
                      : "🔍 Analyzovat"}
                  </button>
                </div>
                {!aiAnalysis && !aiAnalysisLoading && (
                  <div style={{ color: T.subtle, fontSize: 13, textAlign: "center", padding: "24px 0" }}>
                    Klikni „Analyzovat" a Gemini ti doporučí co koupit, prodat nebo držet.
                  </div>
                )}
                {aiAnalysisLoading && (
                  <div style={{ color: T.muted, fontSize: 13, padding: "20px 0", textAlign: "center" }}>
                    <span style={{ animation: "pulse 1s infinite", display: "inline-block" }}>🤖</span> Gemini analyzuje tvoje portfolio…
                  </div>
                )}
                {aiAnalysis && (
                  <div style={{ fontSize: 13, lineHeight: 1.7, color: T.muted }} dangerouslySetInnerHTML={{ __html: renderMD(aiAnalysis) }} />
                )}
              </div>

              {/* Portfolio souhrn pro AI */}
              <div style={{ ...C }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.muted, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Kontext předaný AI</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {[
                    { l: "Celková hodnota",  v: fmtCZK(totalVal) },
                    { l: "Investováno",      v: fmtCZK(totalInv) },
                    { l: "Celkový zisk",     v: fmtCZK(totalGain) + " (" + gainPct + "%)" },
                    { l: "Počet pozic",      v: allRows.length },
                    { l: "Kategorie",        v: [...new Set(allRows.map(p => p.category))].join(", ") },
                    { l: "Brokéři",          v: [...new Set(allRows.map(p => p.broker))].join(", ") },
                  ].map(r => (
                    <div key={r.l} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid rgba(255,255,255,0.04)", fontSize: 12 }}>
                      <span style={{ color: T.subtle }}>{r.l}</span>
                      <span style={{ color: T.text, fontFamily: MONO }}>{r.v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Pravý sloupec: Chat */}
            <div className="ib-ai-chat" style={{ ...C, display: "flex", flexDirection: "column", height: 600 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 12 }}>💬 AI Chat</div>

              {/* Zprávy */}
              <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, marginBottom: 12, paddingRight: 2 }}>
                {aiMessages.map((m, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", gap: 8 }}>
                    {m.role === "assistant" && (
                      <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg,#6366f1,#8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, flexShrink: 0, marginTop: 2 }}>🤖</div>
                    )}
                    <div style={{
                      maxWidth: "80%", padding: "10px 14px", borderRadius: m.role === "user" ? "12px 12px 4px 12px" : "4px 12px 12px 12px",
                      background: m.role === "user" ? "rgba(99,102,241,0.2)" : T.bg,
                      border: "1px solid " + (m.role === "user" ? "rgba(99,102,241,0.4)" : T.border),
                      fontSize: 13, lineHeight: 1.6, color: T.text,
                    }}>
                      {m.role === "assistant"
                        ? <><span dangerouslySetInnerHTML={{ __html: renderMD(m.content) }} />{m.typing && <span style={{ display: "inline-block", width: 6, height: 14, background: T.blue, borderRadius: 2, marginLeft: 3, animation: "pulse 0.7s infinite" }} />}</>
                        : m.content
                      }
                    </div>
                  </div>
                ))}
                <div ref={aiBottomRef} />
              </div>

              {/* Návrhy (jen na začátku) */}
              {aiMessages.length <= 1 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
                  {SUGGESTIONS.map(s => (
                    <button key={s} onClick={() => setAiInput(s)}
                      style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid " + T.border, background: T.bg, color: T.muted, cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif" }}>
                      {s}
                    </button>
                  ))}
                </div>
              )}

              {/* Input */}
              <div style={{ display: "flex", gap: 8 }}>
                <input value={aiInput} onChange={e => setAiInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); } }}
                  placeholder="Zeptej se na své portfolio…"
                  disabled={aiLoading}
                  style={{ ...inputBase, flex: 1 }}
                />
                <button onClick={sendChat} disabled={aiLoading || !aiInput.trim()}
                  style={{ padding: "9px 16px", borderRadius: 8, border: "none", background: aiLoading || !aiInput.trim() ? "rgba(99,102,241,0.3)" : "linear-gradient(135deg,#6366f1,#8b5cf6)", color: "#fff", cursor: aiLoading || !aiInput.trim() ? "not-allowed" : "pointer", fontSize: 16 }}>
                  {aiLoading ? "⏳" : "➤"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  const TABS = [
    { id: "portfolio", label: "Přehled" },
    { id: "analyza",   label: "Analýza" },
    { id: "penzijko",  label: "Penzijko" },
    { id: "positions", label: "Pozice" },
    { id: "ai",        label: "🤖 AI" },
  ];

  return (
    <div>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f13; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

        /* ── Grid systém ── */
        .ib-grid4   { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
        .ib-grid2   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .ib-grid3   { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .ib-ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* ── Unified horizontal scroll row ──────────────────────────────
           Sjednocený vzor horizontálního scrollu na mobilu.
           Používá se pro: tržní indexy, projekce-roky, hero-stats.
           Na desktopu se chová jako normální flex.                      */
        .ib-scroll-row {
          display: flex;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          gap: 8px;
          padding-bottom: 4px;
        }
        .ib-scroll-row::-webkit-scrollbar { display: none; }
        .ib-scroll-card { flex-shrink: 0; }

        /* ── Header ── */
        .ib-hdr-fx       { display: flex; align-items: center; gap: 6px; }
        .ib-nav          { display: flex; }
        .ib-tab-bar      { display: none; }
        .ib-hdr-currency { display: flex; }
        .ib-hdr-divider  { display: block; }

        /* ── Motorola Edge 50 Neo & podobné (≤ 480 px) ── */
        @media (max-width: 480px) {
          /* Základní layout */
          .ib-main   { padding: 10px 10px 72px 10px !important; max-width: 100% !important; }
          .ib-header { padding: 0 10px !important; height: 48px !important; }

          /* Gridy */
          .ib-grid4   { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
          .ib-grid2   { grid-template-columns: 1fr !important; gap: 10px !important; }
          .ib-grid3   { grid-template-columns: 1fr !important; gap: 10px !important; }
          .ib-ai-grid { grid-template-columns: 1fr !important; gap: 10px !important; }

          /* Header – skryj FX kurzy a divider */
          .ib-hdr-fx      { display: none !important; }
          .ib-hdr-divider { display: none !important; }
          .ib-nav         { display: none !important; }

          /* Spodní tab bar */
          .ib-tab-bar {
            display: flex !important;
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
            background: rgba(15,15,19,0.98);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 4px 0 calc(4px + env(safe-area-inset-bottom));
          }

          /* ── Tržní data: horizontální scroll (stejný vzor jako .ib-scroll-row) ── */
          .ib-mkt-grid {
            display: flex !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch !important;
            scrollbar-width: none !important;
            gap: 8px !important;
            padding-bottom: 4px !important;
          }
          .ib-mkt-grid::-webkit-scrollbar { display: none; }
          .ib-mkt-card { min-width: 100px !important; flex-shrink: 0 !important; }

          /* Hero hodnota */
          .ib-hero-value { font-size: 26px !important; letter-spacing: -0.02em !important; }
          .ib-hero-sub   { font-size: 10px !important; }
          /* Hero stats: zabalí do 2 řádků (hodnota+zisk / výnosy), nescroluje */
          .ib-hero-row   { gap: 12px !important; flex-wrap: wrap !important; }
          .ib-hero-row > * { min-width: 0; }

          /* StatCard kompaktnější */
          .ib-statcard     { padding: 10px 12px !important; border-radius: 10px !important; }
          .ib-statcard-val { font-size: 13px !important; word-break: break-word !important; overflow-wrap: anywhere !important; }
          .ib-statcard-lbl { font-size: 9px !important; }
          .ib-statcard-sub { font-size: 10px !important; word-break: break-word !important; overflow-wrap: anywhere !important; }

          /* Tabulky – horizontální scroll */
          .ib-table-wrap { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; border-radius: 10px !important; }
          .ib-table-wrap table { min-width: 560px !important; }

          /* Karty */
          .ib-card { border-radius: 10px !important; padding: 12px 12px !important; }

          /* Penzijko */
          .ib-pension-kpi     { grid-template-columns: 1fr 1fr !important; }
          .ib-penzijko-header { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }
          .ib-penzijko-header > div:last-child { text-align: left !important; }

          /* Projekce */
          .ib-proj-grid    { grid-template-columns: 1fr !important; }
          .ib-contrib-row  { flex-wrap: wrap !important; gap: 8px !important; padding: 12px !important; }
          .ib-contrib-spacer { display: none !important; }
          .ib-contrib-label  { font-size: 12px !important; }

          /* Přehled – period tlačítka */
          .ib-period-row { flex-wrap: wrap !important; gap: 4px !important; }

          /* Pozice – záhlaví a akce */
          .ib-pos-header  { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; }
          .ib-pos-actions { flex-wrap: wrap !important; gap: 6px !important; }

          /* AI */
          .ib-ai-header { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; }
          .ib-ai-chat   { height: 460px !important; min-height: 300px !important; }

          /* Majetek – inputy */
          .ib-majetek-input { width: 140px !important; font-size: 13px !important; }

          /* Grafy */
          .ib-chart-tall { height: 170px !important; }
        }

        @media (min-width: 481px) {
          .ib-tab-bar { display: none !important; }
          .ib-nav     { display: flex !important; }
          .ib-main    { padding: 28px 32px; }
        }
      `}</style>

      <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: "'DM Sans', system-ui, sans-serif", overflowX: "hidden", width: "100%" }}>
        {/* HEADER */}
        <header className="ib-header" style={{ height: 56, padding: "0 32px", borderBottom: "1px solid " + T.border, display: "flex", alignItems: "center", position: "sticky", top: 0, background: "rgba(15,15,19,0.96)", backdropFilter: "blur(20px)", zIndex: 100 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginRight: 40 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: "linear-gradient(135deg," + T.green + "," + T.blue + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, color: "#000" }}>i</div>
            <div>
              <span style={{ fontSize: 17, fontWeight: 700, color: T.text, letterSpacing: "-0.01em" }}>InvestBook</span>
              <span onClick={() => setShowChangelog(true)} title="Zobrazit changelog"
                style={{ fontSize: 10, color: T.blue, marginLeft: 6, fontFamily: "'DM Mono',monospace", cursor: "pointer", textDecoration: "underline dotted", textUnderlineOffset: 3 }}>{APP_VERSION}</span>
            </div>
          </div>
          <nav className="ib-nav" style={{ gap: 2 }}>
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                style={{ padding: "6px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, transition: "all 0.12s",
                  background: activeTab === tab.id ? "rgba(255,255,255,0.08)" : "transparent",
                  color: activeTab === tab.id ? T.text : T.muted }}>
                {tab.label}
              </button>
            ))}
          </nav>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
            <div className="ib-hdr-currency" style={{ gap: 2, background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: 3 }}>
              {["CZK","EUR","USD"].map(cur => (
                <button key={cur} onClick={() => setDispCurrency(cur)}
                  style={{ padding: "3px 10px", borderRadius: 6, border: "none", cursor: "pointer",
                    fontFamily: "'DM Mono',monospace", fontSize: 12, fontWeight: 700, transition: "all 0.12s",
                    background: dispCurrency === cur ? T.blue : "transparent",
                    color: dispCurrency === cur ? "#fff" : T.muted }}>
                  {cur}
                </button>
              ))}
            </div>
            <div className="ib-hdr-divider" style={{ height: 20, width: 1, background: T.border }} />
          </div>
        </header>

        {/* Mobile bottom tab bar */}
        <div className="ib-tab-bar">
          {TABS.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "4px 0",
                color: activeTab === tab.id ? T.green : T.muted }}>
              <span style={{ fontSize: 20 }}>
                {tab.id === "portfolio" ? "📊" : tab.id === "analyza" ? "🔍" : tab.id === "penzijko" ? "🏦" : tab.id === "ai" ? "🤖" : "📋"}
              </span>
              <span style={{ fontSize: 11, fontWeight: 600 }}>{tab.label}</span>
            </button>
          ))}
        </div>

        <main className="ib-main" style={{ maxWidth: 1360, margin: "0 auto", padding: "28px 32px", boxSizing: "border-box", width: "100%" }}>
          {gsMsg !== "" && (
            <div style={{ marginBottom: 14, padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 600,
              background: gsStatus === "error" ? "rgba(239,68,68,0.1)" : "rgba(16,185,129,0.1)",
              border: "1px solid " + (gsStatus === "error" ? "rgba(239,68,68,0.25)" : "rgba(16,185,129,0.25)"),
              color: gsStatus === "error" ? "#f87171" : "#6ee7b7" }}>
              {gsMsg}
            </div>
          )}
          {activeTab === "portfolio" && tabPrehled()}
          {activeTab === "positions" && tabPozice()}
          {activeTab === "analyza"   && tabAnalyza()}
          {activeTab === "penzijko"  && tabPenzijko()}
          {activeTab === "ai"        && tabAI()}
        </main>
      </div>

      {/* ── Changelog modal ─────────────────────────────── */}
      {showChangelog && (
        <div onClick={() => setShowChangelog(false)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div onClick={e => e.stopPropagation()}
            style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 16, padding: 28, maxWidth: 480, width: "100%", maxHeight: "80vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 17, fontWeight: 700, color: T.text }}>InvestBook changelog</div>
                <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>Historie verzí</div>
              </div>
              <button onClick={() => setShowChangelog(false)}
                style={{ background: "rgba(255,255,255,0.06)", border: "none", color: T.muted, borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
            </div>
            {CHANGELOG.map((entry, i) => (
              <div key={entry.version} style={{ marginBottom: i < CHANGELOG.length - 1 ? 20 : 0 }}>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: T.blue, fontFamily: "'DM Mono',monospace",
                    background: T.blue + "15", border: "1px solid " + T.blue + "40", borderRadius: 6, padding: "2px 8px" }}>{entry.version}</span>
                  <span style={{ fontSize: 12, color: T.subtle }}>{entry.date}</span>
                </div>
                <ul style={{ margin: 0, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 4 }}>
                  {entry.changes.map((c, j) => (
                    <li key={j} style={{ fontSize: 13, color: T.muted, lineHeight: 1.5 }}>{c}</li>
                  ))}
                </ul>
                {i < CHANGELOG.length - 1 && <div style={{ height: 1, background: T.border, marginTop: 20 }} />}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InvestBook));

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        // Unregister všechny staré SW, pak zaregistruj nový
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) await reg.unregister();
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.log('SW error:', e));
      });
    }
  </script>
</body>
</html>
